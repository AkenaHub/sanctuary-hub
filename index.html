<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctuary | Script Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 500: '#4f46e5', 600: '#4338ca' },
                        surface: { 900: '#09090b', 800: '#111113', 700: '#1a1a1e' }
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        
        @keyframes toastEnter {
            0% { transform: translateX(100%) scale(0.9); opacity: 0; }
            100% { transform: translateX(0) scale(1); opacity: 1; }
        }
        @keyframes toastLeave {
            0% { transform: translateX(0) scale(1); opacity: 1; }
            100% { transform: translateX(100%) scale(0.9); opacity: 0; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }
        .toast-enter { animation: toastEnter 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .toast-leave { animation: toastLeave 0.3s cubic-bezier(0.5, 0, 0.2, 1) forwards; }
        .modal-animate { animation: fadeIn 0.2s ease-out forwards; }

        .cm-s-sanctuary.CodeMirror { 
            background: #121215; color: #e2e8f0; border-radius: 0.75rem; padding: 1.25rem; 
            font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 13px; 
            line-height: 1.6; border: 1px solid rgba(39, 39, 42, 0.8); height: 320px;
        }
        .cm-s-sanctuary .CodeMirror-cursor { border-left: 2px solid #515dfa; }
        .cm-s-sanctuary span.cm-keyword { color: #c678dd; } 
        .cm-s-sanctuary span.cm-string { color: #98c379; } 
        .cm-s-sanctuary span.cm-comment { color: #5c6370; font-style: italic; } 
        .cm-s-sanctuary span.cm-variable, .cm-s-sanctuary span.cm-property, .cm-s-sanctuary span.cm-def { color: #e2e8f0; } 
        .cm-s-sanctuary span.cm-builtin, .cm-s-sanctuary span.cm-variable-2 { color: #61afef; }
        .cm-s-sanctuary span.cm-operator, .cm-s-sanctuary span.cm-punctuation { color: #abb2bf; }
        .cm-s-sanctuary .CodeMirror-selected { background: rgba(79, 70, 229, 0.3) !important; }
        .cm-s-sanctuary.CodeMirror-focused { border-color: rgba(79, 70, 229, 0.5); box-shadow: 0 0 0 1px rgba(79, 70, 229, 0.5); outline: none; }
    </style>
</head>
<body class="bg-black text-zinc-100 font-sans h-screen flex overflow-hidden selection:bg-brand-500/30">

    <aside class="w-64 bg-surface-900 border-r border-zinc-800 flex flex-col z-10 shadow-2xl">
        <div class="p-6 border-b border-zinc-800/50">
            <h1 class="text-xl font-bold text-white flex items-center gap-3">
                <div class="p-1.5 bg-brand-500/20 rounded-md">
                    <i data-lucide="shield" class="text-brand-500 w-5 h-5"></i>
                </div>
                Sanctuary
            </h1>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <button onclick="setTab('projects')" id="tab-projects" class="w-full flex items-center gap-3 px-4 py-3 rounded-md transition-all text-sm font-medium">
                <i data-lucide="folder" class="w-5 h-5"></i> Projects
            </button>
            <button onclick="setTab('settings')" id="tab-settings" class="w-full flex items-center gap-3 px-4 py-3 rounded-md transition-all text-sm font-medium">
                <i data-lucide="settings" class="w-5 h-5"></i> Settings
            </button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto relative bg-[#030303]">
        <div id="main-content" class="p-8 max-w-6xl mx-auto min-h-full">
            <div class="flex items-center justify-center h-full">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-brand-500"></i>
            </div>
        </div>
    </main>

    <div id="modal-container"></div>
    <div id="toast-container" class="fixed bottom-6 right-6 z- flex flex-col gap-2 pointer-events-none"></div>

    <script>
        const state = {
            activeTab: 'projects',
            projects: [],
            draftScript: { projectId: null, file: null, code: null }
        };

        // --- API Syncing ---
        async function loadFromServer() {
            try {
                const res = await fetch('/api/sync');
                if (res.ok) {
                    const data = await res.json();
                    state.projects = data.projects || [];
                }
            } catch (err) {
                console.warn('Backend disconnected, running in local mode.', err);
            } finally {
                renderApp();
            }
        }

        async function syncToServer() {
            try {
                await fetch('/api/sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projects: state.projects })
                });
            } catch (err) {
                showToast('Failed to save to server', 'error');
            }
        }

        // --- Core Utilities ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const isError = type === 'error';
            
            toast.className = `toast-enter pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl border border-zinc-800 bg-[#111113] shadow-2xl text-sm font-semibold text-white`;
            toast.innerHTML = `<i data-lucide="${isError ? 'alert-circle' : 'check-circle'}" class="w-[18px] h-[18px] fill-white text-[#111113]"></i><span>${message}</span>`;
            
            container.appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-leave');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function copyToClipboard(text, successMsg) {
            const textArea = document.createElement("textarea");
            textArea.value = text;
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast(successMsg || 'Copied to clipboard!');
            } catch (err) {
                showToast('Failed to copy text', 'error');
            }
            document.body.removeChild(textArea);
        }

        async function generateSHA256(text) {
            const msgBuffer = new TextEncoder().encode(text + Date.now().toString());
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function getShortDate() {
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const today = new Date();
            return `${months.at(today.getMonth())} ${today.getDate()}`;
        }

        function incrementVersion(ver) {
            let parts = ver.replace('v', '').split('.');
            let patch = parseInt(parts.pop() || 0) + 1;
            parts.push(patch);
            return `v${parts.join('.')}`;
        }

        // --- File Handling Functions ---
        function handleFileSelect(e) { handleFiles(e.target.files); }

        function handleFiles(files) {
            if(files && files.length > 0) {
                const file = files.item(0); 
                if(file && file.name && file.name.toLowerCase().endsWith('.lua')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        state.draftScript.file = file;
                        state.draftScript.code = event.target.result; // Saves the actual Lua code!
                        document.getElementById('drop-text').innerHTML = `<span class="text-emerald-400 font-semibold bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">${file.name}</span>`;
                    };
                    reader.readAsText(file);
                } else {
                    showToast('Only .lua files are permitted', 'error');
                }
            }
        }

        function setupDragDrop() {
            const dropZone = document.getElementById('drop-zone');
            if(!dropZone) return;
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => dropZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, false));
            ['dragenter', 'dragover'].forEach(evt => dropZone.addEventListener(evt, () => dropZone.classList.add('border-brand-500', 'bg-brand-500/5'), false));
            ['dragleave', 'drop'].forEach(evt => dropZone.addEventListener(evt, () => dropZone.classList.remove('border-brand-500', 'bg-brand-500/5'), false));
            dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
        }

        // --- Rendering Engine ---
        function setTab(tab) { state.activeTab = tab; renderApp(); }

        function renderApp() {
            document.getElementById('tab-projects').className = `w-full flex items-center gap-3 px-4 py-3 rounded-md transition-all text-sm font-medium ${state.activeTab === 'projects' ? 'border border-[#272a54] bg-[#15172b] text-[#515dfa]' : 'border border-transparent text-zinc-400 hover:bg-surface-800 hover:text-white'}`;
            document.getElementById('tab-settings').className = `w-full flex items-center gap-3 px-4 py-3 rounded-md transition-all text-sm font-medium ${state.activeTab === 'settings' ? 'border border-[#272a54] bg-[#15172b] text-[#515dfa]' : 'border border-transparent text-zinc-400 hover:bg-surface-800 hover:text-white'}`;

            const main = document.getElementById('main-content');
            if (state.activeTab === 'projects') {
                main.innerHTML = `
                    <div class="flex justify-between items-center mb-8">
                        <div>
                            <h2 class="text-3xl font-bold text-white tracking-tight">Projects</h2>
                            <p class="text-zinc-500 text-sm mt-1">Manage your script hubs and loaders.</p>
                        </div>
                        <button onclick="openCreateProjectModal()" class="bg-brand-600 hover:bg-brand-500 text-white px-5 py-2.5 rounded-lg flex items-center gap-2 font-medium transition-all shadow-[0_0_15px_rgba(79,70,229,0.3)] hover:shadow-[0_0_20px_rgba(79,70,229,0.5)]">
                            <i data-lucide="plus" class="w-5 h-5"></i> Create Project
                        </button>
                    </div>
                    <div class="space-y-4">${renderProjectsList()}</div>
                `;
            } else {
                main.innerHTML = `<div class="max-w-2xl"><h2 class="text-3xl font-bold text-white tracking-tight mb-8">Settings</h2><div class="bg-surface-800 border border-zinc-800 rounded-xl p-6"><p class="text-sm text-zinc-500">API connection successfully synchronized.</p></div></div>`;
            }
            lucide.createIcons();
        }

        function toggleProject(id) {
            const proj = state.projects.find(p => p.id === id);
            if (proj) proj.expanded = !proj.expanded;
            renderApp();
        }

        function renderProjectsList() {
            if (state.projects.length === 0) return `<div class="text-center py-24 border-2 border-dashed border-zinc-800/60 rounded-2xl bg-surface-800/30"><h3 class="text-lg font-medium text-white">No projects yet</h3></div>`;

            return state.projects.map(p => `
                <div class="bg-surface-800 border border-zinc-800 rounded-xl overflow-hidden transition-all duration-300 ${p.expanded ? 'shadow-xl shadow-black/50 ring-1 ring-white/5' : 'hover:border-zinc-700'}">
                    <div class="flex items-center justify-between p-5 cursor-pointer bg-surface-800 hover:bg-surface-700/50" onclick="toggleProject('${p.id}')">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-lg bg-brand-500/10 border border-brand-500/20 flex items-center justify-center"><i data-lucide="box" class="text-brand-400 w-5 h-5"></i></div>
                            <div>
                                <h3 class="text-lg font-semibold text-white">${p.name}</h3>
                                <p class="text-[11px] text-zinc-500 font-mono">ID: ${p.id.substring(0, 16)}...</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="event.stopPropagation(); openProjectSettings('${p.id}')" class="p-2 text-zinc-400 hover:text-white hover:bg-surface-700 rounded-lg" title="Settings"><i data-lucide="settings" class="w-5 h-5"></i></button>
                            <div class="w-px h-6 bg-zinc-800 mx-2"></div>
                            <i data-lucide="${p.expanded ? 'chevron-up' : 'chevron-down'}" class="text-zinc-500 w-5 h-5"></i>
                        </div>
                    </div>
                    ${p.expanded ? `
                    <div class="p-5 border-t border-zinc-800/80 bg-[#0a0a0c]">
                        <div class="flex gap-3 mb-5">
                            <button onclick="openAddScriptModal('${p.id}')" class="bg-surface-700 hover:bg-surface-700/80 text-white px-4 py-2.5 rounded-lg flex items-center gap-2 text-sm font-medium border border-zinc-700/50"><i data-lucide="file-plus-2" class="w-4 h-4 text-brand-400"></i> ADD SCRIPT</button>
                            <button onclick="openCustomLoaderModal('${p.id}')" class="bg-surface-700 hover:bg-surface-700/80 text-white px-4 py-2.5 rounded-lg flex items-center gap-2 text-sm font-medium border border-zinc-700/50"><i data-lucide="code-2" class="w-4 h-4 text-zinc-400"></i> CUSTOM LOADER</button>
                        </div>
                        <div class="space-y-2">${renderScripts(p.scripts, p.id)}</div>
                    </div>` : ''}
                </div>
            `).join('');
        }

        function renderScripts(scripts, projectId) {
            if (scripts.length === 0) return `<div class="text-sm text-zinc-500 text-center py-6 bg-surface-900/50 rounded-lg border border-zinc-800/30">No scripts added. Click "Add Script".</div>`;
            
            return scripts.map(s => `
                <div class="group flex flex-col sm:flex-row sm:items-center justify-between p-3.5 bg-[#121215] border border-zinc-800/80 rounded-lg hover:border-brand-500/30 transition-all">
                    <div class="flex items-center gap-4 mb-3 sm:mb-0">
                        <!-- Custom iOS-style Redesigned Toggle -->
                        <button onclick="toggleScriptStatusDirect('${projectId}', '${s.id}')" class="relative inline-flex h-[22px] w-[42px] flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none transition-all border-[1.5px] ${s.status === 'Active' ? 'border-[#272a54] bg-[#0a0a0c]' : 'border-zinc-800 bg-[#0a0a0c]'}" title="Toggle Active">
                            <span class="pointer-events-none absolute left-[2px] inline-block h-[15px] w-[15px] transform rounded-full transition-all duration-300 ease-in-out ${s.status === 'Active' ? 'translate-x-[19px] bg-[#515dfa]' : 'translate-x-0 bg-zinc-600'}"></span>
                        </button>
                        <div>
                            <div class="flex items-center gap-3">
                                <h4 class="font-semibold text-zinc-100 text-sm ${s.status !== 'Active' ? 'opacity-50 line-through' : ''}">${s.name}</h4>
                                <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-brand-500/10 text-brand-400 border border-brand-500/20">${s.version}</span>
                            </div>
                            <div class="flex items-center gap-3 mt-1.5 text-[11px] text-zinc-400 font-medium tracking-wide">
                                <span class="flex items-center gap-1.5 bg-surface-800 px-2 py-0.5 rounded border border-zinc-700/50"><i data-lucide="gamepad-2" class="w-3 h-3 text-zinc-500"></i> ${s.gameId}</span>
                                <span class="flex items-center gap-1.5"><i data-lucide="calendar" class="w-3 h-3 text-zinc-500"></i> ${s.date}</span>
                            </div>
                        </div>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <button onclick="openEditScriptModal('${projectId}', '${s.id}')" class="px-3 py-1.5 text-xs font-medium text-zinc-400 hover:text-brand-400 hover:bg-brand-500/10 rounded-md transition-colors flex items-center gap-1.5"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i> EDIT</button>
                        <button onclick="copyToClipboard('loadstring(game:HttpGet(\\'${window.location.origin}/${projectId}/${s.id}\\'))()', 'Copied Script Loader!')" class="px-3 py-1.5 text-xs font-medium text-zinc-400 hover:text-emerald-400 hover:bg-emerald-500/10 rounded-md transition-colors flex items-center gap-1.5"><i data-lucide="copy" class="w-3.5 h-3.5"></i> COPY LOADER</button>
                        <button onclick="deleteScript('${projectId}', '${s.id}')" class="px-3 py-1.5 text-xs font-medium text-zinc-400 hover:text-red-400 hover:bg-red-500/10 rounded-md transition-colors flex items-center gap-1.5"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i> DELETE</button>
                    </div>
                </div>
            `).join('');
        }

        // --- Modals Management ---
        function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

        function openCreateProjectModal() {
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div class="bg-surface-800 border border-zinc-800/80 p-6 rounded-2xl w-full max-w-md shadow-2xl modal-animate ring-1 ring-white/5">
                    <h3 class="text-xl font-bold text-white mb-5 flex items-center gap-2"><i data-lucide="folder-plus" class="text-brand-400 w-5 h-5"></i> Create Project</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase tracking-wider">Custom Project Name</label>
                            <input type="text" id="input-cp-name" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none">
                        </div>
                    </div>
                    <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-zinc-800/50">
                        <button onclick="closeModal()" class="px-5 py-2.5 text-sm font-medium text-zinc-400 hover:text-white rounded-lg">Cancel</button>
                        <button id="btn-submit-project" onclick="submitCreateProject()" class="bg-brand-600 hover:bg-brand-500 text-white px-6 py-2.5 rounded-lg text-sm font-medium shadow-lg min-w-[140px]">Create Project</button>
                    </div>
                </div>
            </div>`;
            lucide.createIcons();
            setTimeout(() => document.getElementById('input-cp-name')?.focus(), 100);
        }

        async function submitCreateProject() {
            const name = document.getElementById('input-cp-name').value.trim();
            if (!name) return showToast('Please enter a project name', 'error');

            const btn = document.getElementById('btn-submit-project');
            btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>';
            btn.disabled = true;

            const id = await generateSHA256(name);
            state.projects.push({ id, name, expanded: true, loaderCode: "", scripts: [] });
            
            await syncToServer(); // Save instantly
            closeModal();
            showToast('Project created successfully');
            renderApp();
        }

        function openProjectSettings(projectId) {
            const project = state.projects.find(p => p.id === projectId);
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div class="bg-surface-800 border border-zinc-800/80 p-6 rounded-2xl w-full max-w-md shadow-2xl modal-animate ring-1 ring-white/5">
                    <h3 class="text-xl font-bold text-white mb-5 flex items-center gap-2"><i data-lucide="settings-2" class="text-zinc-400 w-5 h-5"></i> Project Settings</h3>
                    <div>
                        <label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase tracking-wider">Change Project Name</label>
                        <input type="text" id="input-ps-name" value="${project.name}" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none">
                    </div>
                    <div class="flex items-center justify-between mt-8 pt-4 border-t border-zinc-800/50">
                        <button onclick="deleteProject('${projectId}')" class="text-red-400 hover:bg-red-500/10 px-4 py-2.5 rounded-lg flex items-center gap-2 text-sm font-medium"><i data-lucide="trash-2" class="w-4 h-4"></i> Delete Project</button>
                        <div class="flex gap-2">
                            <button onclick="closeModal()" class="px-4 py-2.5 text-sm text-zinc-400 hover:text-white rounded-lg">Cancel</button>
                            <button onclick="saveProjectSettings('${projectId}')" class="bg-brand-600 hover:bg-brand-500 text-white px-5 py-2.5 rounded-lg text-sm font-medium">Save</button>
                        </div>
                    </div>
                </div>
            </div>`;
            lucide.createIcons();
        }

        async function saveProjectSettings(projectId) {
            const name = document.getElementById('input-ps-name').value.trim();
            if (!name) return showToast('Project name cannot be empty', 'error');
            const project = state.projects.find(p => p.id === projectId);
            if (project) {
                project.name = name;
                await syncToServer();
            }
            closeModal();
            showToast('Project updated');
            renderApp();
        }

        async function deleteProject(projectId) {
            state.projects = state.projects.filter(p => p.id !== projectId);
            await syncToServer();
            closeModal();
            showToast('Project deleted successfully');
            renderApp();
        }

        function openAddScriptModal(projectId) {
            state.draftScript = { projectId, file: null, code: null };
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div class="bg-surface-800 border border-zinc-800/80 p-6 rounded-2xl w-full max-w-lg shadow-2xl modal-animate ring-1 ring-white/5 my-8">
                    <h3 class="text-xl font-bold text-white mb-5 flex items-center gap-2"><i data-lucide="file-code" class="text-brand-400 w-5 h-5"></i> Add New Script</h3>
                    <div class="space-y-5">
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase tracking-wider">Custom Script Name</label>
                            <input type="text" id="input-as-name" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none" placeholder="e.g. ESP & Wallhack">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase tracking-wider">Roblox Game ID</label>
                            <input type="text" id="input-as-gameid" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none font-mono" placeholder="123456789">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase tracking-wider">Upload File <span class="text-zinc-500 font-normal">(.lua only)</span></label>
                            <div id="drop-zone" class="border-2 border-dashed border-zinc-700 rounded-xl p-8 text-center bg-[#0a0a0c] hover:bg-surface-800 hover:border-brand-500/50 transition-all cursor-pointer relative group">
                                <input type="file" accept=".lua" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="handleFileSelect(event)">
                                <div class="bg-surface-800 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3"><i data-lucide="upload-cloud" class="w-6 h-6 text-brand-400"></i></div>
                                <p class="text-sm text-zinc-300 font-medium" id="drop-text">Drag & drop your file here</p>
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-zinc-800/50">
                        <button onclick="closeModal()" class="px-5 py-2.5 text-sm font-medium text-zinc-400 hover:text-white rounded-lg">Cancel</button>
                        <button id="btn-submit-script" onclick="submitAddScript()" class="bg-brand-600 hover:bg-brand-500 text-white px-6 py-2.5 rounded-lg text-sm font-medium min-w-[140px]">Upload Script</button>
                    </div>
                </div>
            </div>`;
            lucide.createIcons();
            setupDragDrop();
        }

        async function submitAddScript() {
            const name = document.getElementById('input-as-name').value.trim();
            const gameId = document.getElementById('input-as-gameid').value.trim();
            const { file, code, projectId } = state.draftScript;

            if(!name || !gameId || !file || !code) return showToast('Please fill all fields and select a valid Lua file.', 'error');

            const project = state.projects.find(p => p.id === projectId);
            if(project) {
                const btn = document.getElementById('btn-submit-script');
                btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin text-white"></i>';
                btn.disabled = true;

                const scriptId = await generateSHA256(name + gameId + "script");
                
                project.scripts.push({
                    id: scriptId, name, gameId, status: 'Active', version: 'v0.0.1', date: getShortDate(), fileName: file.name, code: code
                });
                
                await syncToServer();
                closeModal();
                showToast('Script uploaded successfully');
                renderApp();
            }
        }

        function openEditScriptModal(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            const script = project.scripts.find(s => s.id === scriptId);

            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div class="bg-surface-800 border border-zinc-800/80 p-6 rounded-2xl w-full max-w-lg shadow-2xl modal-animate ring-1 ring-white/5">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="text-xl font-bold text-white flex items-center gap-2"><i data-lucide="edit" class="text-brand-400 w-5 h-5"></i> Edit Script</h3>
                        <span class="px-2.5 py-1 rounded text-xs font-bold bg-brand-500/10 text-brand-400 border border-brand-500/20">${script.version}</span>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase tracking-wider">Script Name</label>
                            <input type="text" id="input-es-name" value="${script.name}" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase tracking-wider">Game ID</label>
                            <input type="text" id="input-es-gameid" value="${script.gameId}" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none font-mono">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase tracking-wider">Reupload File <span class="text-brand-400 normal-case">(Bumps Version)</span></label>
                            <input type="file" id="input-es-file" accept=".lua" class="w-full text-sm text-zinc-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:bg-surface-700 file:text-white hover:file:bg-surface-600 bg-[#0a0a0c] border border-zinc-700 rounded-lg outline-none cursor-pointer">
                        </div>
                    </div>
                    <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-zinc-800/50">
                        <button onclick="closeModal()" class="px-5 py-2.5 text-sm font-medium text-zinc-400 hover:text-white rounded-lg">Cancel</button>
                        <button onclick="saveEditScript('${projectId}', '${scriptId}')" class="bg-brand-600 hover:bg-brand-500 text-white px-6 py-2.5 rounded-lg text-sm">Save Changes</button>
                    </div>
                </div>
            </div>`;
            lucide.createIcons();
        }

        async function toggleScriptStatusDirect(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            if (!project) return;
            const script = project.scripts.find(s => s.id === scriptId);
            if (!script) return;
            
            script.status = script.status === 'Active' ? 'Inactive' : 'Active';
            await syncToServer();
            renderApp();
            showToast(`Script ${script.status === 'Active' ? 'enabled' : 'disabled'}`);
        }

        async function saveEditScript(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            const script = project.scripts.find(s => s.id === scriptId);
            const newName = document.getElementById('input-es-name').value.trim();
            const newGameId = document.getElementById('input-es-gameid').value.trim();
            const fileInput = document.getElementById('input-es-file');

            if(!newName || !newGameId) return showToast('Name and Game ID cannot be empty', 'error');

            script.name = newName;
            script.gameId = newGameId;

            if(fileInput.files && fileInput.files.length > 0) {
                const file = fileInput.files.item(0); 
                if(file && file.name && file.name.toLowerCase().endsWith('.lua')) {
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        script.version = incrementVersion(script.version);
                        script.fileName = file.name;
                        script.code = event.target.result;
                        script.date = getShortDate();
                        await syncToServer();
                        closeModal();
                        showToast('Script updated successfully');
                        renderApp();
                    };
                    reader.readAsText(file);
                    return; // exit while reader works
                }
            }

            await syncToServer();
            closeModal();
            showToast('Script updated successfully');
            renderApp();
        }

        async function deleteScript(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            if(project) {
                project.scripts = project.scripts.filter(s => s.id !== scriptId);
                await syncToServer();
                showToast('Script deleted successfully');
                renderApp();
            }
        }

        function openCustomLoaderModal(projectId) {
            const project = state.projects.find(p => p.id === projectId);
            const currentCode = project.loaderCode || "";
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div class="bg-[#111113] border border-zinc-800/80 p-0 rounded-2xl w-full max-w-3xl shadow-2xl modal-animate overflow-hidden">
                    <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800/80 bg-surface-900/50">
                        <h3 class="text-sm font-bold text-white flex items-center gap-2"><i data-lucide="code" class="text-zinc-400 w-4 h-4"></i> Loader Code (Lua)</h3>
                        <div class="flex items-center gap-2">
                            <button onclick="copyLoaderCode()" class="px-3 py-1.5 text-xs text-zinc-300 hover:text-white bg-surface-800 rounded-md border border-zinc-700/50">Copy Loader</button>
                            <button onclick="autoGenerateLoader('${projectId}')" class="px-3 py-1.5 text-xs text-brand-400 bg-brand-500/10 rounded-md border border-brand-500/20">Auto Generate</button>
                            <button onclick="saveLoaderCode('${projectId}')" class="px-3 py-1.5 text-xs text-white bg-brand-600 rounded-md shadow-lg shadow-brand-500/20">Save</button>
                            <button onclick="closeModal()" class="p-1.5 text-zinc-500 hover:text-white rounded-md ml-2"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <div class="p-4 bg-[#0a0a0c]"><textarea id="loader-code-textarea">${currentCode}</textarea></div>
                </div>
            </div>`;
            lucide.createIcons();

            setTimeout(() => {
                window.loaderEditor = CodeMirror.fromTextArea(document.getElementById('loader-code-textarea'), {
                    mode: 'lua', theme: 'sanctuary', lineNumbers: false, matchBrackets: true, indentUnit: 4
                });
            }, 10);
        }

        function autoGenerateLoader(projectId) {
            if (window.loaderEditor) {
                window.loaderEditor.setValue(`local ProjectId = "${projectId}"\nlocal Scripts = {\n}\n\nlocal Script = Scripts[game.GameId]\nif Script then\n    loadstring(game:HttpGet(Script))()\nelse\n    -- For the user to decide\nend`);
                showToast('Auto-generated loader template');
            }
        }

        function copyLoaderCode() {
            if (window.loaderEditor) {
                const code = window.loaderEditor.getValue();
                if (code.trim()) copyToClipboard(code, 'Loader code copied to clipboard!');
            }
        }

        async function saveLoaderCode(projectId) {
            const project = state.projects.find(p => p.id === projectId);
            if (project && window.loaderEditor) {
                project.loaderCode = window.loaderEditor.getValue();
                await syncToServer();
                closeModal();
                showToast('Loader code saved successfully');
            }
        }

        // Initialize App by loading data from your Railway Backend!
        loadFromServer();
    </script>
</body>
</html>
