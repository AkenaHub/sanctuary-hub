<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luau-Auth | Script Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>
    <script src="https://unpkg.com/luaparse@0.3.1/luaparse.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#4f46e5', 600: '#4338ca' }, surface: { 900: '#09090b', 800: '#111113', 700: '#1a1a1e' } }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
        @keyframes toastEnter { 0% { transform: translateX(100%) scale(0.9); opacity: 0; } 100% { transform: translateX(0) scale(1); opacity: 1; } }
        @keyframes toastLeave { 0% { transform: translateX(0) scale(1); opacity: 1; } 100% { transform: translateX(100%) scale(0.9); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .toast-enter { animation: toastEnter 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .toast-leave { animation: toastLeave 0.3s cubic-bezier(0.5, 0, 0.2, 1) forwards; }
        .modal-animate { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .cm-s-luauauth.CodeMirror { background: rgba(0, 0, 0, 0.4); color: #e2e8f0; border-radius: 0.75rem; padding: 1.25rem; font-family: monospace; font-size: 13px; line-height: 1.6; border: 1px solid rgba(255, 255, 255, 0.1); height: 320px; transition: all 0.3s ease; backdrop-filter: blur(16px); }
        button, div, input, select { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        button:hover { transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
        .glass-card { background: rgba(15, 15, 20, 0.4); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }
        .glass-input { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .glass-input:focus { border-color: rgba(79, 70, 229, 0.5); box-shadow: inset 0 0 10px rgba(79, 70, 229, 0.1); }
        .glass-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); }
        .glass-btn:hover { background: rgba(255, 255, 255, 0.08); }
    </style>
</head>
<body class="bg-[#05050a] text-zinc-100 font-sans h-screen flex overflow-hidden selection:bg-brand-500/30 relative">

    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-15%] left-[-10%] w-[50vw] h-[50vw] bg-brand-600/10 blur-[120px] rounded-full mix-blend-screen animate-pulse duration-[8s]"></div>
        <div class="absolute bottom-[-15%] right-[-10%] w-[50vw] h-[50vw] bg-indigo-600/10 blur-[120px] rounded-full mix-blend-screen animate-pulse duration-[10s]" style="animation-delay: 2s;"></div>
        <div class="absolute top-[30%] left-[50%] w-[40vw] h-[40vw] bg-blue-600/5 blur-[120px] rounded-full mix-blend-screen animate-pulse duration-[12s]" style="animation-delay: 4s;"></div>
    </div>

    <aside id="main-sidebar" class="w-64 bg-black/20 backdrop-blur-2xl border-r border-white/5 flex flex-col z-20 shadow-2xl hidden transition-all duration-500">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h1 class="text-xl font-bold text-white flex items-center gap-3"><div class="p-1.5 bg-brand-500/20 border border-brand-500/30 rounded-md shadow-[0_0_15px_rgba(79,70,229,0.3)]"><i data-lucide="shield" class="text-brand-400 w-5 h-5"></i></div>Luau-Auth</h1>
            <div id="bell-icon-container" class="relative cursor-pointer hover:scale-110 hidden" onclick="showToast('Your API Key is expiring soon!', 'error')">
                <i data-lucide="bell" class="w-5 h-5 text-zinc-400 hover:text-white"></i>
                <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>
            </div>
        </div>
        
        <div id="user-profile-area" class="p-4 border-b border-white/5 bg-white/[0.01]"></div>

        <nav id="sidebar-nav" class="flex-1 p-4 space-y-1.5">
            <button onclick="setTab('dashboard')" id="tab-dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</button>
            <button onclick="setTab('projects')" id="tab-projects" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium"><i data-lucide="folder" class="w-5 h-5"></i> Projects</button>
            <button onclick="setTab('keys')" id="tab-keys" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium"><i data-lucide="key" class="w-5 h-5"></i> HWID Keys</button>
            <button onclick="setTab('register')" id="tab-register" class="w-full items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium hidden"><i data-lucide="users" class="w-5 h-5"></i> Register</button>
            <button onclick="setTab('settings')" id="tab-settings" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium"><i data-lucide="settings" class="w-5 h-5"></i> Settings</button>
        </nav>
        
        <div id="logout-container" class="p-4 border-t border-white/5 hidden bg-white/[0.01]">
            <button onclick="openLogoutModal()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-zinc-400 hover:bg-red-500/10 hover:text-red-400 text-sm font-medium">
                <i data-lucide="log-out" class="w-5 h-5"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto relative z-10 flex flex-col transition-all duration-500 w-full min-w-0">
        <div id="main-content" class="p-4 sm:p-8 max-w-7xl mx-auto flex-1 w-full overflow-x-hidden">
            <div class="flex items-center justify-center h-full">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-brand-500"></i>
            </div>
        </div>
    </main>

    <div id="modal-container" class="z-50 relative"></div>
    <div id="toast-container" class="fixed bottom-6 right-6 z- flex flex-col gap-2 pointer-events-none"></div>

    <script>
        const state = {
            activeTab: 'dashboard',
            projects: [],
            adminKeys: {},
            user: null,
            apiKey: localStorage.getItem('sanctuary_api_key') || "",
            draftScript: { projectId: null, file: null, code: null }
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-enter pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-2xl border border-white/10 backdrop-blur-2xl bg-black/60 shadow-[0_8px_32px_0_rgba(0,0,0,0.36)] text-sm font-semibold text-white`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-[18px] h-[18px] ${type === 'error' ? 'text-red-400' : 'text-emerald-400'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.remove('toast-enter'); toast.classList.add('toast-leave'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function copyToClipboard(text, successMsg) {
            const textArea = document.createElement("textarea"); textArea.value = text; textArea.style.position = "fixed"; 
            document.body.appendChild(textArea); textArea.focus(); textArea.select();
            try { document.execCommand('copy'); showToast(successMsg || 'Copied!'); } catch (err) { showToast('Failed to copy', 'error'); }
            document.body.removeChild(textArea);
        }

        async function generateSHA256(text) {
            const msgBuffer = new TextEncoder().encode(text + Date.now().toString());
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function incrementVersion(ver) {
            let parts = ver.replace('v', '').split('.');
            let patch = parseInt(parts.pop() || 0) + 1; parts.push(patch); return `v${parts.join('.')}`;
        }
        
        function getShortDate() {
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const today = new Date(); return `${months.at(today.getMonth())} ${today.getDate()}`;
        }

        function generateHWIDKey() {
            return Array.from(crypto.getRandomValues(new Uint8Array(12))).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function initApp() {
            const userData = localStorage.getItem('sanctuary_user');
            if (userData) {
                state.user = JSON.parse(userData);
                document.getElementById('main-sidebar').classList.remove('hidden');
                
                const avatarUrl = state.user.avatar && state.user.avatar !== "" ? `https://cdn.discordapp.com/avatars/${state.user.id}/${state.user.avatar}.png` : null;
                const avatarHtml = avatarUrl ? `<img src="${avatarUrl}" class="w-10 h-10 rounded-full border border-brand-500/30 object-cover shadow-md transition-all hover:scale-110">` : `<div class="w-10 h-10 rounded-full bg-brand-500/20 flex items-center justify-center text-brand-400 font-bold uppercase border border-brand-500/30 transition-all hover:scale-110">${state.user.username.charAt(0)}</div>`;

                document.getElementById('user-profile-area').innerHTML = `
                    <div class="flex items-center gap-3">
                        ${avatarHtml}
                        <div class="overflow-hidden">
                            <p class="text-sm font-semibold text-white truncate">${state.user.username}</p>
                            <p class="text-[10px] uppercase tracking-widest text-zinc-400 font-bold flex items-center gap-1">
                                ${state.user.isAdmin ? '<i data-lucide="crown" class="w-3 h-3 text-yellow-500"></i> ADMIN' : 'MEMBER'}
                            </p>
                        </div>
                    </div>
                `;
                
                if (state.user.isAdmin) {
                    const regBtn = document.getElementById('tab-register');
                    regBtn.classList.remove('hidden'); regBtn.classList.add('flex');
                }
                document.getElementById('logout-container').classList.remove('hidden');
                
                await loadFromServer();
                checkApiKeyStatus();
            } else {
                renderLoginPanel();
            }
            lucide.createIcons();
        }

        function renderLoginPanel() {
            document.getElementById('main-content').innerHTML = `
                <div class="flex items-center justify-center h-full">
                    <div class="glass-card rounded-[2rem] p-10 max-w-md w-full text-center modal-animate relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-brand-500/10 blur-[50px] rounded-full"></div>
                        <div class="w-20 h-20 bg-brand-500/10 text-brand-400 rounded-[1.5rem] flex items-center justify-center mx-auto mb-6 border border-brand-500/20 shadow-[0_0_30px_rgba(79,70,229,0.2)]"><i data-lucide="shield" class="w-10 h-10"></i></div>
                        <h2 class="text-4xl font-extrabold text-white mb-3 tracking-tight">Luau-Auth</h2>
                        <p class="text-zinc-400 text-sm mb-10 font-medium">Securely authenticate via Discord.</p>
                        <a href="/api/auth/discord" class="relative group w-full flex items-center justify-center gap-3 bg-[#5865F2] hover:bg-[#4752C4] text-white py-4 rounded-2xl text-sm font-bold shadow-[0_0_20px_rgba(88,101,242,0.4)] border border-white/10 transition-all hover:-translate-y-1 overflow-hidden">
                            <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                            <i data-lucide="log-in" class="w-5 h-5 relative z-10"></i> <span class="relative z-10 tracking-wide uppercase">Login with Discord</span>
                        </a>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        async function checkApiKeyStatus() {
            if (!state.apiKey || state.user.isAdmin) return;
            try {
                const res = await fetch('/api/check-key', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: state.apiKey })
                });
                const data = await res.json();
                if (data.valid) {
                    const daysLeft = Math.ceil((data.expiresAt - Date.now()) / (1000 * 60 * 60 * 24));
                    if (daysLeft <= 3 && daysLeft >= 1) {
                        document.getElementById('bell-icon-container').classList.remove('hidden');
                    } else {
                        document.getElementById('bell-icon-container').classList.add('hidden');
                    }
                }
            } catch (err) {}
        }

        async function saveApiKey() {
            const key = document.getElementById('input-user-apikey').value.trim();
            if(!key) return showToast('Please enter an API key', 'error');
            try {
                const res = await fetch('/api/link-key', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: key, discordId: state.user.id, discordName: state.user.username })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                
                state.apiKey = key; localStorage.setItem('sanctuary_api_key', key);
                showToast('API Key saved!'); checkApiKeyStatus();
            } catch (err) { showToast(err.message, 'error'); }
        }

        async function loadFromServer() {
            try {
                const res = await fetch(`/api/sync?discordId=${state.user.id}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.projects) {
                        state.projects = data.projects;
                    }
                }
            } catch (err) {} 
            finally { renderApp(); }
        }

        async function syncToServer() {
            try {
                const res = await fetch('/api/sync', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projects: state.projects, apiKey: state.apiKey, discordId: state.user.id })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
            } catch (err) { showToast(err.message || 'Failed to save. Check key.', 'error'); throw err; }
        }

        function openLogoutModal() {
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/60 backdrop-blur-lg flex items-center justify-center z-50 p-4">
                <div class="glass-card border border-white/10 p-8 rounded-[2rem] w-full max-w-sm shadow-2xl modal-animate text-center relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-red-500/10 blur-[40px] rounded-full"></div>
                    <div class="w-16 h-16 bg-red-500/20 text-red-400 rounded-full flex items-center justify-center mx-auto mb-6 hover:scale-110 transition-transform shadow-[0_0_15px_rgba(239,68,68,0.2)]"><i data-lucide="log-out" class="w-8 h-8"></i></div>
                    <h3 class="text-2xl font-bold text-white mb-2 tracking-tight">Sign Out</h3>
                    <p class="text-sm text-zinc-400 mb-8">Are you sure you want to sign out or switch accounts?</p>
                    <div class="flex gap-4">
                        <button onclick="closeModal()" class="flex-1 px-4 py-3 glass-btn text-white rounded-xl text-sm font-bold">Cancel</button>
                        <button onclick="confirmLogout()" class="flex-1 px-4 py-3 bg-red-500/80 hover:bg-red-500 text-white rounded-xl text-sm font-bold border border-red-500/50 shadow-[0_0_15px_rgba(239,68,68,0.3)] hover:-translate-y-1 transition-all">Sign Out</button>
                    </div>
                </div>
            </div>`;
            lucide.createIcons();
        }

        function confirmLogout() {
            localStorage.removeItem('sanctuary_user'); localStorage.removeItem('sanctuary_api_key');
            window.location.reload();
        }

        async function setTab(tab) { 
            state.activeTab = tab; 
            if (tab === 'keys' || tab === 'dashboard') await loadFromServer();
            else renderApp();
        }

        function renderApp() {
            if (!state.user) return;

            ['dashboard', 'projects', 'keys', 'settings'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (el) el.className = `w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-medium ${state.activeTab === t ? 'bg-brand-500/20 text-brand-300 border border-brand-500/30 shadow-[0_0_15px_rgba(79,70,229,0.15)]' : 'text-zinc-400 hover:bg-white/5 hover:text-white border border-transparent'}`;
            });
            const regTab = document.getElementById('tab-register');
            if (regTab) regTab.className = `w-full items-center gap-3 px-4 py-3.5 rounded-xl text-sm font-medium ${state.activeTab === 'register' ? 'bg-brand-500/20 text-brand-300 border border-brand-500/30 shadow-[0_0_15px_rgba(79,70,229,0.15)]' : 'text-zinc-400 hover:bg-white/5 hover:text-white border border-transparent'} ${state.user.isAdmin ? 'flex' : 'hidden'}`;

            const main = document.getElementById('main-content');
            
            if (state.activeTab === 'dashboard') {
                renderDashboard(main);
            } else if (state.activeTab === 'projects') {
                renderProjects(main);
            } else if (state.activeTab === 'keys') {
                renderKeys(main);
            } else if (state.activeTab === 'register') {
                renderRegister(main);
            } else {
                renderSettings(main);
            }
            lucide.createIcons();
        }

        function renderProjects(mainContainer) {
            mainContainer.innerHTML = `
                <div class="flex justify-between items-center mb-8 modal-animate">
                    <div><h2 class="text-4xl font-extrabold text-white tracking-tight">Projects</h2><p class="text-zinc-400 text-sm mt-2 font-medium">Manage your script hubs and loaders.</p></div>
                    <button onclick="openCreateProjectModal()" class="bg-brand-600/80 hover:bg-brand-500 backdrop-blur-md border border-brand-500/50 text-white px-6 py-3 rounded-xl flex items-center gap-2 font-bold shadow-[0_0_20px_rgba(79,70,229,0.3)] hover:-translate-y-1"><i data-lucide="plus" class="w-5 h-5"></i> Create Project</button>
                </div>
                <div class="space-y-5 modal-animate">${renderProjectsList()}</div>
            `;
        }

        function renderDashboard(mainContainer) {
            let totalExecutions = 0;
            let topScript = { name: "N/A", execs: 0 };
            
            state.projects.forEach(p => p.scripts.forEach(s => {
                const execs = s.executions || 0;
                totalExecutions += execs;
                if (execs >= topScript.execs && execs > 0) {
                    topScript = { name: s.name, execs: execs };
                }
            }));

            mainContainer.innerHTML = `
                <div class="flex justify-between items-center mb-8 modal-animate">
                    <div><h2 class="text-4xl font-extrabold text-white tracking-tight">Dashboard Overview</h2><p class="text-zinc-400 text-sm mt-2 font-medium">Track analytics and real-time script executions.</p></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 modal-animate">
                    <div class="glass-card rounded-[2rem] p-8 flex items-center gap-5 hover:bg-white/[0.05] hover:border-brand-500/30 hover:-translate-y-1 transition-all">
                        <div class="w-14 h-14 bg-brand-500/20 rounded-2xl flex items-center justify-center border border-brand-500/30 text-brand-400 shadow-[0_0_15px_rgba(79,70,229,0.2)]"><i data-lucide="activity" class="w-7 h-7"></i></div>
                        <div><p class="text-zinc-400 text-sm font-bold uppercase tracking-wider mb-1">Total Executions</p><p class="text-3xl font-black text-white">${totalExecutions.toLocaleString()}</p></div>
                    </div>
                    <div class="glass-card rounded-[2rem] p-8 flex items-center gap-5 hover:bg-white/[0.05] hover:border-emerald-500/30 hover:-translate-y-1 transition-all">
                        <div class="w-14 h-14 bg-emerald-500/20 rounded-2xl flex items-center justify-center border border-emerald-500/30 text-emerald-400 shadow-[0_0_15px_rgba(16,185,129,0.2)]"><i data-lucide="flame" class="w-7 h-7"></i></div>
                        <div><p class="text-zinc-400 text-sm font-bold uppercase tracking-wider mb-1">Most Executed</p><p class="text-2xl font-black text-white truncate max-w-[200px]">${topScript.name} <span class="text-base font-bold text-emerald-500 ml-2">${topScript.execs > 0 ? `(${topScript.execs})` : ''}</span></p></div>
                    </div>
                </div>

                <div class="glass-card rounded-[2rem] p-8 modal-animate hover:border-brand-500/30 transition-all w-full overflow-hidden">
                    <h3 class="text-sm font-bold text-white mb-6 flex items-center gap-2 uppercase tracking-wider"><i data-lucide="bar-chart-2" class="w-5 h-5 text-brand-400"></i> Execution History</h3>
                    <div class="h-[400px] w-full relative">
                        <canvas id="executionChart"></canvas>
                    </div>
                </div>
            `;
            
            const ctx = document.getElementById('executionChart').getContext('2d');
            const datesSet = new Set();
            const totalHistory = {};

            state.projects.forEach(p => p.scripts.forEach(s => {
                let histSum = 0;
                if (!s.executionHistory) s.executionHistory = {};
                Object.values(s.executionHistory).forEach(v => histSum += v);
                
                if ((s.executions || 0) > histSum) {
                    const fallbackDate = new Date().toISOString().split('T').shift();
                    s.executionHistory[fallbackDate] = (s.executionHistory[fallbackDate] || 0) + (s.executions - histSum);
                }

                Object.keys(s.executionHistory).forEach(d => {
                    datesSet.add(d);
                    totalHistory[d] = (totalHistory[d] || 0) + s.executionHistory[d];
                });
            }));

            if (datesSet.size === 0) datesSet.add(new Date().toISOString().split('T').shift());
            
            const labels = Array.from(datesSet).sort();
            
            const hexToRGBA = (hex, alpha) => {
                let r = parseInt(hex.slice(1, 3), 16),
                    g = parseInt(hex.slice(3, 5), 16),
                    b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r}, ${g}, ${b}, ${alpha})`;
            };

            const getGradient = (hex) => {
                let grad = ctx.createLinearGradient(0, 0, 0, 400);
                grad.addColorStop(0, hexToRGBA(hex, 0.4));
                grad.addColorStop(1, hexToRGBA(hex, 0.0));
                return grad;
            };

            const colors = ['#10b981', '#4f46e5', '#f43f5e', '#f59e0b', '#06b6d4', '#8b5cf6', '#d946ef'];
            let colorIdx = 0;
            const datasets = [];

            state.projects.forEach(p => p.scripts.forEach(s => {
                if(s.executions && s.executions > 0) {
                    const c = colors[colorIdx % colors.length];
                    datasets.push({
                        label: `${p.name} - ${s.name}`,

        async function generateProjectHWIDKey() {
            const projId = document.getElementById('hwid-proj-select').value;
            const note = document.getElementById('hwid-note').value.trim();
            const days = document.getElementById('hwid-days').value;
            const amount = Math.min(1000, Math.max(1, parseInt(document.getElementById('hwid-amount').value) || 1));
            
            const project = state.projects.find(p => p.id === projId);
            if (!project) return;
            
            if (!project.hwidKeys) project.hwidKeys = [];
            const expiresAt = Date.now() + (parseInt(days) * 24 * 60 * 60 * 1000);
            
            for(let i=0; i<amount; i++) {
                project.hwidKeys.push({ key: generateHWIDKey(), note: note, hwid: null, ip: null, lastReset: 0, expiresAt, roleRemoved: false });
            }
            
            try {
                await syncToServer(); showToast(`Generated ${amount} Key(s)!`);
                document.getElementById('hwid-note').value = ''; renderHWIDTable();
            } catch(e) { 
                for(let i=0; i<amount; i++) project.hwidKeys.pop();
            }
        }

        async function clearInactiveKeys() {
            const projId = document.getElementById('hwid-proj-select').value;
            const project = state.projects.find(p => p.id === projId);
            if (!project || !project.hwidKeys) return;
            
            const initialLen = project.hwidKeys.length;
            project.hwidKeys = project.hwidKeys.filter(k => {
                const isUnused = !k.userId;
                const isExpired = Date.now() > k.expiresAt;
                return !isUnused && !isExpired; 
            });
            
            if (project.hwidKeys.length === initialLen) return showToast('No inactive keys found.');
            
            try {
                await syncToServer(); 
                showToast(`Cleared ${initialLen - project.hwidKeys.length} inactive keys!`); 
                renderHWIDTable(); 
            } catch(e) { await loadFromServer(); }
        }

        async function resetHWID(projId, keyStr) {
            const project = state.projects.find(p => p.id === projId);
            const k = project.hwidKeys.find(k => k.key === keyStr);
            const cooldownMs = (project.hwidResetCooldown || 24) * 60 * 60 * 1000;
            
            if (Date.now() - k.lastReset < cooldownMs) {
                const hoursLeft = Math.ceil((cooldownMs - (Date.now() - k.lastReset)) / 3600000);
                return showToast(`Cooldown active. Try again in ${hoursLeft} hours.`, 'error');
            }
            
            const oldHwid = k.hwid; const oldIp = k.ip; const oldReset = k.lastReset;
            k.hwid = null; k.ip = null; k.lastReset = Date.now();
            try { await syncToServer(); showToast('HWID Reset successfully'); renderHWIDTable(); } 
            catch(e) { k.hwid = oldHwid; k.ip = oldIp; k.lastReset = oldReset; renderHWIDTable(); }
        }

        async function deleteHWIDKey(projId, keyStr) {
            if(!confirm("Delete this key? User will lose script access instantly.")) return;
            const project = state.projects.find(p => p.id === projId);
            const kIdx = project.hwidKeys.findIndex(k => k.key === keyStr);
            const kStore = project.hwidKeys[kIdx];
            project.hwidKeys.splice(kIdx, 1);
            try { await syncToServer(); showToast('Key deleted'); renderHWIDTable(); } 
            catch(e) { project.hwidKeys.splice(kIdx, 0, kStore); renderHWIDTable(); }
        }

        function setupDragDrop() {
            const dropZone = document.getElementById('drop-zone');
            if(!dropZone) return;
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => dropZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, false));
            ['dragenter', 'dragover'].forEach(evt => dropZone.addEventListener(evt, () => dropZone.classList.add('border-brand-500', 'bg-brand-500/10'), false));
            ['dragleave', 'drop'].forEach(evt => dropZone.addEventListener(evt, () => dropZone.classList.remove('border-brand-500', 'bg-brand-500/10'), false));
            dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
        }

            if(!newName) return showToast('Script name cannot be empty', 'error');

            const oldState = {...script};
            script.name = newName; script.gameId = newGameId; script.allowSolaraXeno = window.tempAllowSolaraEdit;

            const processSave = async (codeToCheck) => {
                if (codeToCheck && typeof luaparse !== 'undefined') {
                    try { luaparse.parse(codeToCheck, { comments: false }); } 
                    catch (err) {
                        const proceed = confirm(`Syntax Error:\n\n${err.message}\n\nSave anyway?`);
                        if (!proceed) { Object.assign(script, oldState); return; }
                    }
                }
                try { await syncToServer(); closeModal(); showToast('Script updated'); renderApp(); } 
                catch (err) { Object.assign(script, oldState); }
            };

            if(fileInput.files && fileInput.files.length > 0) {
                const file = fileInput.files.item(0); 
                if(file && file.name && file.name.toLowerCase().endsWith('.lua')) {
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        script.version = incrementVersion(script.version);
                        script.fileName = file.name; script.code = event.target.result; script.date = getShortDate();
                        await processSave(event.target.result);
                    };
                    reader.readAsText(file);
                    return;
                }
            }
            await processSave(null);
        }

        async function toggleScriptStatusDirect(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            const script = project.scripts.find(s => s.id === scriptId);
            script.status = script.status === 'Active' ? 'Inactive' : 'Active';
            try { await syncToServer(); renderApp(); showToast(`Script ${script.status === 'Active' ? 'enabled' : 'disabled'}`); } 
            catch (err) { script.status = script.status === 'Active' ? 'Inactive' : 'Active'; }
        }

        async function deleteScript(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            const sIndex = project.scripts.findIndex(s => s.id === scriptId);
            const sStore = project.scripts[sIndex];
            project.scripts.splice(sIndex, 1);
            try { await syncToServer(); showToast('Script deleted'); renderApp(); } 
            catch (err) { project.scripts.splice(sIndex, 0, sStore); }
        }

        function openCustomLoaderModal(projectId) {
            const project = state.projects.find(p => p.id === projectId);
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/60 backdrop-blur-lg flex items-center justify-center z-50 p-4">
                <div class="glass-card p-0 rounded-3xl w-full max-w-4xl shadow-2xl modal-animate overflow-hidden flex flex-col h-[85vh] max-h-[700px]">
                    <div class="flex items-center justify-between px-8 py-5 border-b border-white/10 bg-black/40 flex-wrap sm:flex-nowrap gap-4">
                        <h3 class="text-xl font-extrabold text-white flex items-center gap-3"><div class="p-2 bg-white/10 rounded-xl border border-white/10"><i data-lucide="code" class="text-zinc-300 w-5 h-5"></i></div> Loader Code (Lua)</h3>
                        <div class="flex items-center gap-3 w-full sm:w-auto justify-end">
                            <button onclick="copyLoaderLink('${projectId}')" class="px-5 py-2.5 text-xs font-bold text-zinc-300 hover:text-white glass-btn rounded-xl flex-1 sm:flex-none shadow-sm">Copy URL</button>
                            <button onclick="autoGenerateLoader('${projectId}')" class="px-5 py-2.5 text-xs font-bold text-brand-300 bg-brand-500/20 hover:bg-brand-500/30 rounded-xl border border-brand-500/30 flex-1 sm:flex-none backdrop-blur-md shadow-[0_0_10px_rgba(79,70,229,0.2)]">Auto Gen</button>
                            <button onclick="saveLoaderCode('${projectId}')" class="px-6 py-2.5 text-xs font-bold text-white bg-brand-600/90 hover:bg-brand-500 border border-brand-500/50 rounded-xl shadow-[0_0_20px_rgba(79,70,229,0.4)] flex-1 sm:flex-none backdrop-blur-md hover:-translate-y-1">Save</button>
                            <button onclick="closeModal()" class="p-2.5 text-zinc-500 hover:text-white rounded-xl bg-white/5 hover:bg-red-500/20 hover:text-red-400 border border-transparent hover:border-red-500/30 ml-2 transition-all"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                    <div class="p-6 bg-black/40 flex-1 relative"><textarea id="loader-code-textarea">${project.loaderCode || ""}</textarea></div>
                </div>
            </div>`;
            lucide.createIcons();
            setTimeout(() => { window.loaderEditor = CodeMirror.fromTextArea(document.getElementById('loader-code-textarea'), { mode: 'lua', theme: 'luauauth', lineNumbers: false, matchBrackets: true, indentUnit: 4 }); }, 10);
        }

        function autoGenerateLoader(projectId) {
            if (window.loaderEditor) {
                const project = state.projects.find(p => p.id === projectId);
                let scriptsTable = "";
                if (project && project.scripts) {
                    project.scripts.forEach(s => {
                        if (s.gameId && s.gameId !== "") { scriptsTable += `    ["${s.gameId}"] = "${window.location.origin}/raw/${projectId}/${s.id}",\n`; } 
                        else { scriptsTable += `    ["Universal"] = "${window.location.origin}/raw/${projectId}/${s.id}",\n`; }
                    });
                }
                let authSnippet = project.freeMode === false ? `\nlocal AuthKey = getgenv().script_key or ""\nlocal hw1 = (gethwid and gethwid()) or "nohwid"\nlocal hw2 = game:GetService("RbxAnalyticsService"):GetClientId()\nlocal hwid = hw1 .. "_" .. hw2\n` : "";
                let callSnippet = project.freeMode === false ? `loadstring(game:HttpGet(Script .. "?key=" .. AuthKey .. "&hwid=" .. hwid))()` : `loadstring(game:HttpGet(Script))()`;
                window.loaderEditor.setValue(`local ProjectId = "${projectId}"\nlocal Scripts = {\n${scriptsTable}}\nlocal Script = Scripts[tostring(game.GameId)] or Scripts[game.GameId] or Scripts["Universal"]\nif Script then${authSnippet}\n    ${callSnippet}\nelse\n    warn("Luau-Auth: No valid script found for this game.")\nend`);
            }
        }

        function copyLoaderLink(projectId) { copyToClipboard(`loadstring(game:HttpGet('${window.location.origin}/loader/${projectId}'))()`, 'Custom Loader URL copied!'); }

        async function saveLoaderCode(projectId) {
            const project = state.projects.find(p => p.id === projectId);
            const oldVal = project.loaderCode; project.loaderCode = window.loaderEditor.getValue();
            try { await syncToServer(); closeModal(); showToast('Loader code saved'); } 
            catch (err) { project.loaderCode = oldVal; }
        }

        initApp();
    </script>
</body>
</html>
