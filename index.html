<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctuary | Script Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { brand: { 500: '#5865F2', 600: '#4752C4' } } } } };
    </script>
    <style>
        body { background: #000; color: #d4d4d8; font-family: 'Inter', sans-serif; overflow: hidden; display: flex; height: 100vh; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        .glass-card { background: #09090b; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 1rem; }
        .solid-input { background: #000; border: 1px solid rgba(255, 255, 255, 0.08); color: white; border-radius: 0.5rem; padding: 0.75rem; width: 100%; outline: none; }
        .solid-input:focus { border-color: #5865F2; }
        .solid-btn { background: #5865F2; color: white; border-radius: 0.5rem; padding: 0.75rem 1.5rem; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .solid-btn:hover { background: #4752C4; }
        .CodeMirror { background: #000; color: #fff; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.1); height: 350px; font-family: monospace; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #18181b; color: #fff; padding: 12px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); z-index: 9999; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside id="main-sidebar" class="w-64 bg-[#09090b] border-r border-white/5 flex flex-col hidden">
        <div class="p-6 border-b border-white/5">
            <h1 class="text-xl font-bold text-white flex items-center gap-3"><div class="p-2 bg-brand-500 rounded text-white"><i data-lucide="shield" class="w-4 h-4"></i></div> Sanctuary</h1>
        </div>
        <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
            <button onclick="setTab('dashboard')" id="tab-dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-colors"><i data-lucide="activity" class="w-4 h-4"></i> Dashboard</button>
            <button onclick="setTab('projects')" id="tab-projects" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-colors"><i data-lucide="folder" class="w-4 h-4"></i> Projects</button>
            <button onclick="setTab('keys')" id="tab-keys" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-colors"><i data-lucide="key" class="w-4 h-4"></i> HWID Keys</button>
            <button onclick="setTab('register')" id="tab-register" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-colors hidden"><i data-lucide="users" class="w-4 h-4"></i> Register</button>
            <button onclick="setTab('settings')" id="tab-settings" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-colors"><i data-lucide="settings" class="w-4 h-4"></i> Settings</button>
        </nav>
        <div class="p-4 border-t border-white/5"><button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-red-500 hover:bg-red-500/10 text-sm font-semibold"><i data-lucide="log-out" class="w-4 h-4"></i> Logout</button></div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto relative flex flex-col w-full min-w-0 bg-[#000]">
        <div id="top-bar" class="w-full p-8 hidden border-b border-white/5 bg-[#000]">
            <h2 id="top-bar-title" class="text-3xl font-bold text-white">Dashboard</h2>
        </div>
        <div id="main-content" class="p-8 max-w-7xl mx-auto flex-1 w-full"><div class="flex items-center justify-center h-full"><i data-lucide="loader-2" class="w-8 h-8 animate-spin text-brand-500"></i></div></div>
    </main>

    <!-- Modals & Toasts -->
    <div id="modal-container" class="z-50 relative"></div>
    <div id="toast-container"></div>

    <script>
        const state = { activeTab: 'dashboard', projects: [], adminKeys: {}, user: null, apiKey: localStorage.getItem('sanctuary_api_key') || "", tempStore: {} };

        // Helper: Toast
        const showToast = (msg) => {
            const t = document.createElement('div'); t.className = 'toast flex items-center gap-2';
            t.innerHTML = `<i data-lucide="check-circle" class="text-emerald-500 w-4 h-4"></i> ${msg}`;
            document.getElementById('toast-container').appendChild(t);
            lucide.createIcons();
            setTimeout(() => t.remove(), 3000);
        };

        // Helper: Modals
        const buildModal = (title, bodyHtml, footerHtml) => {
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                <div class="glass-card p-8 w-full max-w-lg shadow-2xl relative">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xl font-bold text-white">${title}</h3>
                        <button onclick="document.getElementById('modal-container').innerHTML=''" class="text-zinc-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div class="space-y-4">${bodyHtml}</div>
                    <div class="flex justify-end gap-3 mt-8">${footerHtml}</div>
                </div>
            </div>`;
            lucide.createIcons();
        };

        // App Init
        const initApp = async () => {
            const u = localStorage.getItem('sanctuary_user');
            if (!u) return renderLogin();
            state.user = JSON.parse(u);
            document.getElementById('main-sidebar').classList.remove('hidden');
            document.getElementById('top-bar').classList.remove('hidden');
            if (state.user.isAdmin) document.getElementById('tab-register').classList.remove('hidden');
            await loadData();
            setTab('dashboard');
        };

        const renderLogin = () => {
            document.getElementById('main-content').innerHTML = `
            <div class="flex h-[80vh] items-center justify-center">
                <div class="glass-card p-12 text-center max-w-md w-full">
                    <div class="w-16 h-16 bg-[#18181b] border border-white/5 text-brand-500 rounded-xl flex items-center justify-center mx-auto mb-6"><i data-lucide="shield" class="w-8 h-8"></i></div>
                    <h2 class="text-2xl font-bold text-white mb-2">Sanctuary</h2>
                    <p class="text-zinc-500 text-sm mb-8">Securely authenticate via Discord.</p>
                    <button onclick="window.location.href='/api/auth/discord'" class="w-full solid-btn flex justify-center items-center gap-2"><i data-lucide="log-in" class="w-4 h-4"></i> Login</button>
                </div>
            </div>`;
            lucide.createIcons();
        };

        const logout = () => { localStorage.clear(); window.location.reload(); };

        const loadData = async () => {
            try {
                const r = await fetch(`/api/sync?discordId=${state.user.id}`);
                const d = await r.json();
                state.projects = d.projects || [];
            } catch (e) {}
        };

        const saveData = async () => {
            try {
                await fetch('/api/sync', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ projects: state.projects, apiKey: state.apiKey, discordId: state.user.id }) });
            } catch (e) { showToast("Save failed."); }
        };

        const setTab = (t) => {
            state.activeTab = t;
            ['dashboard', 'projects', 'keys', 'register', 'settings'].forEach(id => {
                const el = document.getElementById(`tab-${id}`);
                if(el) el.className = `w-full flex items-center gap-3 px-4 py-3 rounded-lg text-sm font-semibold transition-colors ${t === id ? 'bg-brand-500 text-white' : 'text-zinc-400 hover:bg-white/5 hover:text-white'}`;
            });
            document.getElementById('top-bar-title').innerText = t.charAt(0).toUpperCase() + t.slice(1);
            if (t === 'dashboard') return renderDashboard();
            if (t === 'projects') return renderProjects();
            if (t === 'keys') return renderKeys();
            if (t === 'register') return renderRegister();
            if (t === 'settings') return renderSettings();
        };

        // --- DASHBOARD ---
        const renderDashboard = () => {
            let execs = 0; state.projects.forEach(p => p.scripts.forEach(s => execs += (s.executions || 0)));
            document.getElementById('main-content').innerHTML = `
                <div class="grid grid-cols-2 gap-6 mb-8">
                    <div class="glass-card p-6"><p class="text-zinc-500 text-xs font-bold uppercase tracking-wider mb-2">Total Executions</p><p class="text-4xl font-bold text-white">${execs}</p></div>
                    <div class="glass-card p-6"><p class="text-zinc-500 text-xs font-bold uppercase tracking-wider mb-2">Total Projects</p><p class="text-4xl font-bold text-white">${state.projects.length}</p></div>
                </div>
                <div class="glass-card p-6 h-[400px] w-full relative"><canvas id="chart"></canvas></div>
            `;
            const labels = [getShortDate()];
            new Chart(document.getElementById('chart'), { type: 'line', data: { labels: labels, datasets: [{ label: 'Executions', data: [execs], borderColor: '#5865F2', tension: 0.1 }] }});
            lucide.createIcons();
        };

        // --- PROJECTS ---
        const renderProjects = () => {
            let h = `<div class="flex justify-end mb-6"><button onclick="createProject()" class="solid-btn flex items-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i> New Project</button></div>`;
            h += state.projects.map(p => `
                <div class="glass-card mb-4 overflow-hidden">
                    <div class="p-6 flex justify-between items-center cursor-pointer hover:bg-white/[0.02]" onclick="toggleProj('${p.id}')">
                        <div class="flex items-center gap-4"><i data-lucide="folder" class="text-brand-400"></i><div><h3 class="text-lg font-bold text-white">${p.name}</h3><p class="text-xs text-zinc-500 font-mono">${p.id}</p></div></div>
                        <div class="flex gap-2">
                            <button onclick="event.stopPropagation(); setupProj('${p.id}')" class="p-2 bg-white/5 rounded hover:bg-white/10 text-white text-xs font-bold"><i data-lucide="settings" class="w-4 h-4"></i></button>
                            <button onclick="event.stopPropagation(); openLoader('${p.id}')" class="px-3 py-2 bg-emerald-500/20 text-emerald-400 rounded hover:bg-emerald-500/30 text-xs font-bold uppercase tracking-wider">Loader Code</button>
                            <button onclick="event.stopPropagation(); addScript('${p.id}')" class="px-3 py-2 bg-brand-500 text-white rounded hover:bg-brand-600 text-xs font-bold uppercase tracking-wider">Add Script</button>
                        </div>
                    </div>
                    ${p.expanded ? `<div class="p-6 bg-[#000] border-t border-white/5 space-y-3">${p.scripts.length === 0 ? '<p class="text-zinc-500 text-sm">No scripts added.</p>' : p.scripts.map(s => `
                        <div class="p-4 glass-card flex justify-between items-center">
                            <div><p class="font-bold text-white">${s.name} <span class="bg-white/10 px-2 py-0.5 rounded text-[10px] ml-2 text-zinc-400">${s.version}</span></p><p class="text-xs text-zinc-500 mt-1">Executions: ${s.executions || 0}</p></div>
                            <button onclick="deleteScript('${p.id}', '${s.id}')" class="p-2 text-red-400 hover:bg-red-500/20 rounded"><i data-lucide="trash" class="w-4 h-4"></i></button>
                        </div>
                    `).join('')}</div>` : ''}
                </div>
            `).join('');
            document.getElementById('main-content').innerHTML = h;
            lucide.createIcons();
        };

        window.toggleProj = (id) => { const p = state.projects.find(x => x.id === id); p.expanded = !p.expanded; renderProjects(); };
        window.createProject = async () => {
            const name = prompt("Enter project name:");
            if (!name) return;
            state.projects.push({ id: await generateSHA256(name), name: name, expanded: true, scripts: [], hwidKeys: [], freeMode: true, hwidResetCooldown: 24 });
            await saveData(); renderProjects();
        };
        window.setupProj = (id) => {
            const p = state.projects.find(x => x.id === id);
            state.tempStore.id = id;
            buildModal('Project Settings', `
                <label class="block text-xs font-bold text-zinc-400 mb-2">Project Name</label>
                <input id="ps-name" value="${p.name}" class="solid-input mb-4">
                <label class="block text-xs font-bold text-zinc-400 mb-2">Webhook URL</label>
                <input id="ps-web" value="${p.webhookUrl || ''}" class="solid-input">
            `, `<button onclick="document.getElementById('modal-container').innerHTML=''" class="px-4 py-2 text-zinc-400 font-bold">Cancel</button><button onclick="saveProj()" class="solid-btn">Save</button>`);
        };
        window.saveProj = async () => {
            const p = state.projects.find(x => x.id === state.tempStore.id);
            p.name = document.getElementById('ps-name').value;
            p.webhookUrl = document.getElementById('ps-web').value;
            await saveData(); document.getElementById('modal-container').innerHTML=''; renderProjects();
        };
        window.addScript = (id) => {
            state.tempStore.id = id;
            buildModal('Add Script', `
                <input id="as-name" placeholder="Script Name" class="solid-input mb-4">
                <textarea id="as-code" placeholder="print('hello')" class="solid-input h-32 font-mono"></textarea>
            `, `<button onclick="document.getElementById('modal-container').innerHTML=''" class="px-4 py-2 text-zinc-400 font-bold">Cancel</button><button onclick="saveScript()" class="solid-btn">Upload</button>`);
        };
        window.saveScript = async () => {
            const p = state.projects.find(x => x.id === state.tempStore.id);
            const n = document.getElementById('as-name').value;
            const c = document.getElementById('as-code').value;
            p.scripts.push({ id: await generateSHA256(n), name: n, code: c, status: 'Active', version: 'v1.0.0', executions: 0 });
            await saveData(); document.getElementById('modal-container').innerHTML=''; renderProjects();
        };
        window.deleteScript = async (pid, sid) => {
            const p = state.projects.find(x => x.id === pid);
            p.scripts = p.scripts.filter(x => x.id !== sid);
            await saveData(); renderProjects();
        };
        window.openLoader = (id) => {
            const code = `loadstring(game:HttpGet('${window.location.origin}/loader/${id}'))()`;
            buildModal('Custom Loader', `<div class="bg-[#000] p-4 rounded-lg border border-white/10 font-mono text-xs text-brand-300 break-all">${code}</div>`, `<button onclick="navigator.clipboard.writeText('${code}'); showToast('Copied'); document.getElementById('modal-container').innerHTML=''" class="solid-btn w-full">Copy to Clipboard</button>`);
        };

        // --- KEYS ---
        const renderKeys = () => {
            const opts = state.projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            document.getElementById('main-content').innerHTML = `
                <div class="glass-card p-6 mb-6">
                    <div class="flex gap-4 items-end">
                        <div class="flex-1"><label class="block text-xs font-bold text-zinc-400 mb-2">Project</label><select id="hk-proj" class="solid-input">${opts}</select></div>
                        <div><label class="block text-xs font-bold text-zinc-400 mb-2">Amount</label><input type="number" id="hk-amt" value="1" class="solid-input w-24"></div>
                        <button onclick="genHwidKey()" class="solid-btn whitespace-nowrap">Create Key(s)</button>
                    </div>
                </div>
                <div class="glass-card p-6" id="hk-table">Select a project to view keys.</div>
            `;
            lucide.createIcons();
            document.getElementById('hk-proj').addEventListener('change', drawHwidTable);
            if(state.projects.length) drawHwidTable();
        };
        window.drawHwidTable = () => {
            const p = state.projects.find(x => x.id === document.getElementById('hk-proj').value);
            if(!p || !p.hwidKeys || !p.hwidKeys.length) return document.getElementById('hk-table').innerHTML = `<p class="text-zinc-500 text-sm">No keys found.</p>`;
            document.getElementById('hk-table').innerHTML = p.hwidKeys.map(k => `
                <div class="flex justify-between items-center p-3 border-b border-white/5">
                    <div><code class="text-brand-300 font-bold bg-[#000] px-2 py-1 rounded">${k.key}</code></div>
                    <button onclick="delHwidKey('${p.id}', '${k.key}')" class="text-red-400 text-xs font-bold">Delete</button>
                </div>
            `).join('');
        };
        window.genHwidKey = async () => {
            const pid = document.getElementById('hk-proj').value;
            const amt = parseInt(document.getElementById('hk-amt').value) || 1;
            const p = state.projects.find(x => x.id === pid);
            for(let i=0; i<amt; i++) p.hwidKeys.push({ key: generateHWIDKey(), hwid: null, expiresAt: Date.now() + 30*86400000 });
            await saveData(); drawHwidTable(); showToast(`Created ${amt} keys.`);
        };
        window.delHwidKey = async (pid, key) => {
            const p = state.projects.find(x => x.id === pid);
            p.hwidKeys = p.hwidKeys.filter(x => x.key !== key);
            await saveData(); drawHwidTable();
        };

        // --- REGISTER ---
        const renderRegister = () => {
            document.getElementById('main-content').innerHTML = `
                <div class="glass-card p-6 mb-6 flex justify-between items-center">
                    <h3 class="text-lg font-bold text-white">Admin API Keys</h3>
                    <button onclick="genApiKey()" class="solid-btn">Generate Global Key</button>
                </div>
                <div class="glass-card p-6" id="ak-table">Loading...</div>
            `;
            fetch('/api/admin/keys', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ discordId: state.user.id }) })
            .then(r => r.json()).then(d => {
                const keys = Object.keys(d.keys || {});
                document.getElementById('ak-table').innerHTML = keys.length ? keys.map(k => `<div class="p-3 border-b border-white/5 flex justify-between"><code>${k}</code> <span class="text-xs text-zinc-500">${d.keys[k].username || 'Unclaimed'}</span></div>`).join('') : '<p class="text-zinc-500 text-sm">No keys.</p>';
            });
        };
        window.genApiKey = async () => {
            await fetch('/api/admin/generate-key', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ discordId: state.user.id, days: 30 }) });
            renderRegister(); showToast('Generated.');
        };

        // --- SETTINGS ---
        const renderSettings = () => {
            document.getElementById('main-content').innerHTML = `
                <div class="glass-card p-8 max-w-2xl">
                    <h3 class="text-lg font-bold text-white mb-6">API Configuration</h3>
                    <label class="block text-xs font-bold text-zinc-400 mb-2 uppercase">Your Private API Key</label>
                    <div class="flex gap-4"><input id="s-api" value="${state.apiKey}" type="password" class="solid-input"><button onclick="saveApiSettings()" class="solid-btn">Save</button></div>
                </div>
            `;
        };
        window.saveApiSettings = () => {
            state.apiKey = document.getElementById('s-api').value;
            localStorage.setItem('sanctuary_api_key', state.apiKey);
            showToast('Saved.');
        };

        initApp();
    </script>
</body>
</html>
