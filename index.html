<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luau-Auth | Script Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>
    <script src="https://unpkg.com/luaparse@0.3.1/luaparse.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#4f46e5', 600: '#4338ca' }, surface: { 900: '#09090b', 800: '#111113', 700: '#1a1a1e' } }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #3f3f46; }
        @keyframes toastEnter { 0% { transform: translateX(100%) scale(0.9); opacity: 0; } 100% { transform: translateX(0) scale(1); opacity: 1; } }
        @keyframes toastLeave { 0% { transform: translateX(0) scale(1); opacity: 1; } 100% { transform: translateX(100%) scale(0.9); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95) translateY(10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .toast-enter { animation: toastEnter 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .toast-leave { animation: toastLeave 0.3s cubic-bezier(0.5, 0, 0.2, 1) forwards; }
        .modal-animate { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .cm-s-luauauth.CodeMirror { background: #121215; color: #e2e8f0; border-radius: 0.75rem; padding: 1.25rem; font-family: monospace; font-size: 13px; line-height: 1.6; border: 1px solid rgba(39, 39, 42, 0.8); height: 320px; transition: all 0.3s ease; }
        button, div, input, select { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        button:hover { transform: translateY(-1px); }
        button:active { transform: translateY(1px); }
    </style>
</head>
<body class="bg-black text-zinc-100 font-sans h-screen flex overflow-hidden selection:bg-brand-500/30">

    <aside id="main-sidebar" class="w-64 bg-surface-900 border-r border-zinc-800 flex flex-col z-10 shadow-2xl hidden transition-all duration-500">
        <div class="p-6 border-b border-zinc-800/50 flex justify-between items-center">
            <h1 class="text-xl font-bold text-white flex items-center gap-3"><div class="p-1.5 bg-brand-500/20 rounded-md"><i data-lucide="shield" class="text-brand-500 w-5 h-5"></i></div>Luau-Auth</h1>
            <div id="bell-icon-container" class="relative cursor-pointer hover:scale-110 hidden" onclick="showToast('Your API Key is expiring soon!', 'error')">
                <i data-lucide="bell" class="w-5 h-5 text-zinc-400 hover:text-white"></i>
                <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border border-surface-900"></span>
            </div>
        </div>
        
        <div id="user-profile-area" class="p-4 border-b border-zinc-800/50"></div>

        <nav id="sidebar-nav" class="flex-1 p-4 space-y-1">
            <button onclick="setTab('dashboard')" id="tab-dashboard" class="w-full flex items-center gap-3 px-4 py-3 rounded-md text-sm font-medium"><i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard</button>
            <button onclick="setTab('projects')" id="tab-projects" class="w-full flex items-center gap-3 px-4 py-3 rounded-md text-sm font-medium"><i data-lucide="folder" class="w-5 h-5"></i> Projects</button>
            <button onclick="setTab('keys')" id="tab-keys" class="w-full flex items-center gap-3 px-4 py-3 rounded-md text-sm font-medium"><i data-lucide="key" class="w-5 h-5"></i> HWID Keys</button>
            <button onclick="setTab('register')" id="tab-register" class="w-full items-center gap-3 px-4 py-3 rounded-md text-sm font-medium hidden"><i data-lucide="users" class="w-5 h-5"></i> Register</button>
            <button onclick="setTab('settings')" id="tab-settings" class="w-full flex items-center gap-3 px-4 py-3 rounded-md text-sm font-medium"><i data-lucide="settings" class="w-5 h-5"></i> Settings</button>
        </nav>
        
        <div id="logout-container" class="p-4 border-t border-zinc-800/50 hidden">
            <button onclick="openLogoutModal()" class="w-full flex items-center gap-3 px-4 py-3 rounded-md text-zinc-400 hover:bg-red-500/10 hover:text-red-400 text-sm font-medium">
                <i data-lucide="log-out" class="w-5 h-5"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto relative bg-[#030303] flex flex-col transition-all duration-500">
        <div id="main-content" class="p-8 max-w-6xl mx-auto flex-1 w-full">
            <div class="flex items-center justify-center h-full">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-brand-500"></i>
            </div>
        </div>
    </main>

    <div id="modal-container"></div>
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        const state = {
            activeTab: 'dashboard',
            projects: [],
            adminKeys: {},
            user: null,
            apiKey: localStorage.getItem('sanctuary_api_key') || "",
            draftScript: { projectId: null, file: null, code: null }
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-enter pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-xl border border-zinc-800 bg-[#111113] shadow-2xl text-sm font-semibold text-white`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-[18px] h-[18px] fill-white text-[#111113]"></i><span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.remove('toast-enter'); toast.classList.add('toast-leave'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function copyToClipboard(text, successMsg) {
            const textArea = document.createElement("textarea"); textArea.value = text; textArea.style.position = "fixed"; 
            document.body.appendChild(textArea); textArea.focus(); textArea.select();
            try { document.execCommand('copy'); showToast(successMsg || 'Copied!'); } catch (err) { showToast('Failed to copy', 'error'); }
            document.body.removeChild(textArea);
        }

        async function generateSHA256(text) {
            const msgBuffer = new TextEncoder().encode(text + Date.now().toString());
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function incrementVersion(ver) {
            let parts = ver.replace('v', '').split('.');
            let patch = parseInt(parts.pop() || 0) + 1; parts.push(patch); return `v${parts.join('.')}`;
        }
        
        function getShortDate() {
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const today = new Date(); return `${months.at(today.getMonth())} ${today.getDate()}`;
        }

        function generateHWIDKey() {
            return Array.from(crypto.getRandomValues(new Uint8Array(12))).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function initApp() {
            const userData = localStorage.getItem('sanctuary_user');
            if (userData) {
                state.user = JSON.parse(userData);
                document.getElementById('main-sidebar').classList.remove('hidden');
                
                const avatarUrl = state.user.avatar && state.user.avatar !== "" ? `https://cdn.discordapp.com/avatars/${state.user.id}/${state.user.avatar}.png` : null;
                const avatarHtml = avatarUrl ? `<img src="${avatarUrl}" class="w-10 h-10 rounded-full border border-brand-500/30 object-cover shadow-md transition-all hover:scale-110">` : `<div class="w-10 h-10 rounded-full bg-brand-500/20 flex items-center justify-center text-brand-400 font-bold uppercase border border-brand-500/30 transition-all hover:scale-110">${state.user.username.charAt(0)}</div>`;

                document.getElementById('user-profile-area').innerHTML = `
                    <div class="flex items-center gap-3">
                        ${avatarHtml}
                        <div class="overflow-hidden">
                            <p class="text-sm font-semibold text-white truncate">${state.user.username}</p>
                            <p class="text-[10px] uppercase tracking-widest text-zinc-500 font-bold flex items-center gap-1">
                                ${state.user.isAdmin ? '<i data-lucide="crown" class="w-3 h-3 text-yellow-500"></i> ADMIN' : 'MEMBER'}
                            </p>
                        </div>
                    </div>
                `;
                
                if (state.user.isAdmin) {
                    const regBtn = document.getElementById('tab-register');
                    regBtn.classList.remove('hidden'); regBtn.classList.add('flex');
                }
                document.getElementById('logout-container').classList.remove('hidden');
                
                await loadFromServer();
                checkApiKeyStatus();
            } else {
                renderLoginPanel();
            }
            lucide.createIcons();
        }

        function renderLoginPanel() {
            document.getElementById('main-content').innerHTML = `
                <div class="flex items-center justify-center h-full">
                    <div class="bg-surface-800 border border-zinc-800/80 rounded-2xl p-10 max-w-md w-full text-center shadow-2xl modal-animate ring-1 ring-white/5">
                        <div class="w-16 h-16 bg-brand-500/10 text-brand-400 rounded-2xl flex items-center justify-center mx-auto mb-6 border border-brand-500/20"><i data-lucide="shield" class="w-8 h-8"></i></div>
                        <h2 class="text-3xl font-bold text-white mb-2 tracking-tight">Luau-Auth</h2>
                        <p class="text-zinc-400 text-sm mb-8">Authenticate with Discord to access the dashboard.</p>
                        <a href="/api/auth/discord" class="w-full flex items-center justify-center gap-2 bg-[#5865F2] hover:bg-[#4752C4] text-white py-3 rounded-xl text-sm font-medium shadow-lg shadow-[#5865F2]/20 border border-[#5865F2]/50 hover:border-[#5865F2]">
                            <i data-lucide="log-in" class="w-5 h-5"></i> Login with Discord
                        </a>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        async function checkApiKeyStatus() {
            if (!state.apiKey || state.user.isAdmin) return;
            try {
                const res = await fetch('/api/check-key', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: state.apiKey })
                });
                const data = await res.json();
                if (data.valid) {
                    const daysLeft = Math.ceil((data.expiresAt - Date.now()) / (1000 * 60 * 60 * 24));
                    if (daysLeft <= 3 && daysLeft >= 1) {
                        document.getElementById('bell-icon-container').classList.remove('hidden');
                    } else {
                        document.getElementById('bell-icon-container').classList.add('hidden');
                    }
                }
            } catch (err) {}
        }

        async function saveApiKey() {
            const key = document.getElementById('input-user-apikey').value.trim();
            if(!key) return showToast('Please enter an API key', 'error');
            try {
                const res = await fetch('/api/link-key', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: key, discordId: state.user.id, discordName: state.user.username })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                
                state.apiKey = key; localStorage.setItem('sanctuary_api_key', key);
                showToast('API Key saved!'); checkApiKeyStatus();
            } catch (err) { showToast(err.message, 'error'); }
        }

        async function loadFromServer() {
            const dataKey = 'luau_data_' + state.user.id;
            const localData = localStorage.getItem(dataKey);
            if (localData) state.projects = JSON.parse(localData);

            try {
                const res = await fetch(`/api/sync?discordId=${state.user.id}`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.projects && data.projects.length > 0) {
                        state.projects = data.projects;
                        localStorage.setItem(dataKey, JSON.stringify(state.projects));
                    } else if (state.projects.length > 0) {
                        await syncToServer();
                    }
                }
            } catch (err) {} 
            finally { renderApp(); }
        }

        async function syncToServer() {
            const dataKey = 'luau_data_' + state.user.id;
            localStorage.setItem(dataKey, JSON.stringify(state.projects));
            try {
                const res = await fetch('/api/sync', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projects: state.projects, apiKey: state.apiKey, discordId: state.user.id })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
            } catch (err) { showToast(err.message || 'Failed to save. Check key.', 'error'); throw err; }
        }

        function openLogoutModal() {
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div class="bg-surface-800 border border-zinc-800/80 p-6 rounded-2xl w-full max-w-sm shadow-2xl modal-animate ring-1 ring-white/5 text-center">
                    <div class="w-16 h-16 bg-red-500/10 text-red-400 rounded-full flex items-center justify-center mx-auto mb-4 hover:scale-110 transition-transform"><i data-lucide="log-out" class="w-8 h-8"></i></div>
                    <h3 class="text-xl font-bold text-white mb-2">Sign Out</h3>
                    <p class="text-sm text-zinc-400 mb-6">Are you sure you want to sign out or switch accounts?</p>
                    <div class="flex gap-3">
                        <button onclick="closeModal()" class="flex-1 px-4 py-2.5 bg-surface-700 hover:bg-surface-600 text-white rounded-lg text-sm font-medium">Cancel</button>
                        <button onclick="confirmLogout()" class="flex-1 px-4 py-2.5 bg-red-500 hover:bg-red-600 text-white rounded-lg text-sm font-medium">Sign Out</button>
                    </div>
                </div>
            </div>`;
            lucide.createIcons();
        }

        function confirmLogout() {
            localStorage.removeItem('sanctuary_user'); localStorage.removeItem('sanctuary_api_key');
            window.location.reload();
        }

        function setTab(tab) { state.activeTab = tab; renderApp(); }

        function renderApp() {
            if (!state.user) return;

            ['dashboard', 'projects', 'keys', 'settings'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (el) el.className = `w-full flex items-center gap-3 px-4 py-3 rounded-md text-sm font-medium ${state.activeTab === t ? 'bg-[#15172b] text-[#515dfa]' : 'text-zinc-400 hover:bg-surface-800 hover:text-white'}`;
            });
            const regTab = document.getElementById('tab-register');
            if (regTab) regTab.className = `w-full items-center gap-3 px-4 py-3 rounded-md text-sm font-medium ${state.activeTab === 'register' ? 'bg-[#15172b] text-[#515dfa]' : 'text-zinc-400 hover:bg-surface-800 hover:text-white'} ${state.user.isAdmin ? 'flex' : 'hidden'}`;

            const main = document.getElementById('main-content');
            
            if (state.activeTab === 'dashboard') {
                renderDashboard(main);
            } else if (state.activeTab === 'projects') {
                renderProjects(main);
            } else if (state.activeTab === 'keys') {
                renderKeys(main);
            } else if (state.activeTab === 'register') {
                renderRegister(main);
            } else {
                renderSettings(main);
            }
            lucide.createIcons();
        }

        function renderProjects(mainContainer) {
            mainContainer.innerHTML = `
                <div class="flex justify-between items-center mb-8 modal-animate">
                    <div><h2 class="text-3xl font-bold text-white tracking-tight">Projects</h2><p class="text-zinc-500 text-sm mt-1">Manage your script hubs and loaders.</p></div>
                    <button onclick="openCreateProjectModal()" class="bg-brand-600 hover:bg-brand-500 text-white px-5 py-2.5 rounded-lg flex items-center gap-2 font-medium shadow-[0_0_15px_rgba(79,70,229,0.3)]"><i data-lucide="plus" class="w-5 h-5"></i> Create Project</button>
                </div>
                <div class="space-y-4 modal-animate">${renderProjectsList()}</div>
            `;
        }

        function renderDashboard(mainContainer) {
            let totalExecutions = 0;
            let topScript = { name: "N/A", execs: 0 };
            
            state.projects.forEach(p => p.scripts.forEach(s => {
                const execs = s.executions || 0;
                totalExecutions += execs;
                if (execs >= topScript.execs && execs > 0) {
                    topScript = { name: s.name, execs: execs };
                }
            }));

            mainContainer.innerHTML = `
                <div class="flex justify-between items-center mb-8 modal-animate">
                    <div><h2 class="text-3xl font-bold text-white tracking-tight">Dashboard Overview</h2><p class="text-zinc-500 text-sm mt-1">Track analytics and real-time script executions.</p></div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6 modal-animate">
                    <div class="bg-surface-800 border border-zinc-800 rounded-xl p-6 flex items-center gap-4 hover:border-brand-500/30 hover:scale-[1.02]">
                        <div class="w-12 h-12 bg-brand-500/10 rounded-xl flex items-center justify-center border border-brand-500/20 text-brand-400"><i data-lucide="activity" class="w-6 h-6"></i></div>
                        <div><p class="text-zinc-400 text-sm font-medium">Total Executions</p><p class="text-2xl font-bold text-white">${totalExecutions.toLocaleString()}</p></div>
                    </div>
                    <div class="bg-surface-800 border border-zinc-800 rounded-xl p-6 flex items-center gap-4 hover:border-emerald-500/30 hover:scale-[1.02]">
                        <div class="w-12 h-12 bg-emerald-500/10 rounded-xl flex items-center justify-center border border-emerald-500/20 text-emerald-400"><i data-lucide="flame" class="w-6 h-6"></i></div>
                        <div><p class="text-zinc-400 text-sm font-medium">Most Executed Script</p><p class="text-xl font-bold text-white truncate max-w-[200px]">${topScript.name} <span class="text-sm font-medium text-emerald-500 ml-2">${topScript.execs > 0 ? `(${topScript.execs})` : ''}</span></p></div>
                    </div>
                </div>

                <div class="bg-surface-800 border border-zinc-800 rounded-xl p-6 modal-animate hover:border-brand-500/30">
                    <h3 class="text-sm font-bold text-white mb-4 flex items-center gap-2"><i data-lucide="bar-chart-2" class="w-4 h-4 text-brand-400"></i> Execution History</h3>
                    <div class="h-[400px] w-full relative">
                        <canvas id="executionChart"></canvas>
                    </div>
                </div>
            `;
            
            const ctx = document.getElementById('executionChart').getContext('2d');
            const datesSet = new Set();
            const totalHistory = {};

            state.projects.forEach(p => p.scripts.forEach(s => {
                let histSum = 0;
                if (!s.executionHistory) s.executionHistory = {};
                Object.values(s.executionHistory).forEach(v => histSum += v);
                
                if ((s.executions || 0) > histSum) {
                    const fallbackDate = new Date().toISOString().split('T').shift();
                    s.executionHistory[fallbackDate] = (s.executionHistory[fallbackDate] || 0) + (s.executions - histSum);
                }

                Object.keys(s.executionHistory).forEach(d => {
                    datesSet.add(d);
                    totalHistory[d] = (totalHistory[d] || 0) + s.executionHistory[d];
                });
            }));

            if (datesSet.size === 0) datesSet.add(new Date().toISOString().split('T').shift());
            
            const labels = Array.from(datesSet).sort();
            const colors = ['#10b981', '#f43f5e', '#3b82f6', '#f59e0b', '#8b5cf6', '#d946ef', '#06b6d4'];
            let colorIdx = 0;
            const datasets = [];

            state.projects.forEach(p => p.scripts.forEach(s => {
                if(s.executions && s.executions > 0) {
                    datasets.push({
                        label: `${p.name} - ${s.name}`,
                        data: labels.map(d => (s.executionHistory && s.executionHistory[d]) ? s.executionHistory[d] : 0),
                        borderColor: colors[colorIdx % colors.length],
                        backgroundColor: colors[colorIdx % colors.length],
                        tension: 0.4,
                        borderWidth: 2,
                        pointRadius: 3,
                        fill: false
                    });
                    colorIdx++;
                }
            }));

            datasets.push({
                label: 'Total Executions',
                data: labels.map(d => totalHistory[d] || 0),
                borderColor: '#ffffff',
                backgroundColor: '#ffffff',
                borderDash: Array.of(5, 5),
                borderWidth: 3,
                tension: 0.4,
                pointRadius: 0,
                fill: false
            });

            new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    animation: { duration: 2000, easing: 'easeOutQuart' },
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#27272a' }, ticks: { color: '#a1a1aa' } },
                        x: { grid: { display: false }, ticks: { color: '#a1a1aa' } }
                    },
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#e4e4e7', usePointStyle: true, boxWidth: 8, padding: 20 } },
                        tooltip: { backgroundColor: '#111113', titleColor: '#fff', bodyColor: '#a1a1aa', borderColor: '#27272a', borderWidth: 1 }
                    }
                }
            });
        }

        function renderKeys(mainContainer) {
            const projectOptions = state.projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            
            mainContainer.innerHTML = `
                <div class="max-w-6xl mx-auto modal-animate">
                    <div class="flex justify-between items-center mb-8">
                        <div><h2 class="text-3xl font-bold text-white tracking-tight">HWID Keys</h2><p class="text-zinc-500 text-sm mt-1">Generate and manage access keys for your locked projects.</p></div>
                    </div>
                    
                    <div class="bg-surface-800 border border-zinc-800 rounded-xl p-6 mb-8 hover:border-zinc-700">
                        <div class="flex gap-4 items-end">
                            <div class="flex-1">
                                <label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase">Select Project</label>
                                <select id="hwid-proj-select" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none" onchange="renderHWIDTable()">
                                    ${projectOptions || '<option disabled selected>No projects created</option>'}
                                </select>
                            </div>
                            <div class="flex-1">
                                <label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase">User Note / Discord ID</label>
                                <input type="text" id="hwid-note" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none" placeholder="e.g. buyer_discord">
                            </div>
                            <div class="w-32">
                                <label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase">Days</label>
                                <input type="number" id="hwid-days" value="30" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none">
                            </div>

                const hwidStatus = k.hwid ? `<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20">LOCKED</span>` : `<span class="px-2 py-0.5 rounded text-[10px] font-bold bg-zinc-500/10 text-zinc-400 border border-zinc-500/20">UNUSED</span>`;

                        <button onclick="deleteHWIDKey('${projId}', '${k.key}')" class="px-3 py-1.5 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-md text-xs border border-red-500/20">Delete</button>

        async function generateProjectHWIDKey() {
            const projId = document.getElementById('hwid-proj-select').value;
            const note = document.getElementById('hwid-note').value.trim();
            const days = document.getElementById('hwid-days').value;
            
            const project = state.projects.find(p => p.id === projId);
            if (!project) return;
            
            const newKey = {
                key: generateHWIDKey(), note: note, hwid: null, lastReset: 0,
                expiresAt: Date.now() + (parseInt(days) * 24 * 60 * 60 * 1000)
            };
            
            if (!project.hwidKeys) project.hwidKeys = [];
            project.hwidKeys.push(newKey);
            
            try {
                await syncToServer(); showToast('HWID Key created!');
                document.getElementById('hwid-note').value = ''; renderHWIDTable();
            } catch(e) { project.hwidKeys.pop(); }
        }

        async function resetHWID(projId, keyStr) {
            const project = state.projects.find(p => p.id === projId);
            const k = project.hwidKeys.find(k => k.key === keyStr);
            const cooldownMs = (project.hwidResetCooldown || 24) * 60 * 60 * 1000;
            
            if (Date.now() - k.lastReset < cooldownMs) {
                const hoursLeft = Math.ceil((cooldownMs - (Date.now() - k.lastReset)) / 3600000);
                return showToast(`Cooldown active. Try again in ${hoursLeft} hours.`, 'error');
            }
            
            const oldHwid = k.hwid; const oldReset = k.lastReset;
            k.hwid = null; k.lastReset = Date.now();
            try { await syncToServer(); showToast('HWID Reset successfully'); renderHWIDTable(); } 
            catch(e) { k.hwid = oldHwid; k.lastReset = oldReset; }
        }

        async function deleteHWIDKey(projId, keyStr) {
            if(!confirm("Delete this key? User will lose script access instantly.")) return;
            const project = state.projects.find(p => p.id === projId);
            const kIdx = project.hwidKeys.findIndex(k => k.key === keyStr);
            const kStore = project.hwidKeys[kIdx];
            project.hwidKeys.splice(kIdx, 1);
            try { await syncToServer(); showToast('Key deleted'); renderHWIDTable(); } 
            catch(e) { project.hwidKeys.splice(kIdx, 0, kStore); }
        }

                            <button id="toggle-freemode" onclick="toggleFreeMode()" class="relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none border-[1.5px] ${project.freeMode !== false ? 'border-[#272a54] bg-[#0a0a0c]' : 'border-zinc-800 bg-[#0a0a0c]'}"><span id="toggle-freemode-thumb" class="pointer-events-none absolute left-[2px] inline-block h-3.5 w-3.5 transform rounded-full transition-all duration-300 ${project.freeMode !== false ? 'translate-x-[15px] bg-[#515dfa]' : 'translate-x-0 bg-zinc-600'}"></span></button>
                        </div>
                        <div><label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase">HWID Reset Cooldown (Hours)</label><input type="number" id="input-ps-cooldown" value="${project.hwidResetCooldown || 24}" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none"></div>
                    </div>
                    <div class="flex items-center justify-between mt-8 pt-4 border-t border-zinc-800/50">
                        <button onclick="deleteProject('${projectId}')" class="text-red-400 hover:bg-red-500/10 px-4 py-2.5 rounded-lg flex items-center gap-2 text-sm font-medium"><i data-lucide="trash-2" class="w-4 h-4"></i> Delete Project</button>
                        <div class="flex gap-2">
                            <button onclick="closeModal()" class="px-4 py-2.5 text-sm text-zinc-400 hover:text-white hover:bg-surface-700 rounded-lg">Cancel</button>
                            <button onclick="saveProjectSettings('${projectId}')" class="bg-brand-600 hover:bg-brand-500 text-white px-5 py-2.5 rounded-lg text-sm font-medium">Save</button>
                        </div>
                    </div>
                </div>
            </div>`;
            window.tempFreeMode = project.freeMode !== false;
            lucide.createIcons();
        }

        function toggleFreeMode() {
            window.tempFreeMode = !window.tempFreeMode;
            const btn = document.getElementById('toggle-freemode');
            const thumb = document.getElementById('toggle-freemode-thumb');
            if(window.tempFreeMode) {
                btn.className = "relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none border-[1.5px] border-[#272a54] bg-[#0a0a0c]";
                thumb.className = "pointer-events-none absolute left-[2px] inline-block h-3.5 w-3.5 transform rounded-full transition-all duration-300 translate-x-[15px] bg-[#515dfa]";
            } else {
                btn.className = "relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none border-[1.5px] border-zinc-800 bg-[#0a0a0c]";
                thumb.className = "pointer-events-none absolute left-[2px] inline-block h-3.5 w-3.5 transform rounded-full transition-all duration-300 translate-x-0 bg-zinc-600";
            }
        }

        async function saveProjectSettings(projectId) {
            const name = document.getElementById('input-ps-name').value.trim();
            const webhook = document.getElementById('input-ps-webhook').value.trim();
            const cooldown = document.getElementById('input-ps-cooldown').value;
            if (!name) return showToast('Project name cannot be empty', 'error');
            const project = state.projects.find(p => p.id === projectId);
            const oldName = project.name; const oldWebhook = project.webhookUrl; const oldMode = project.freeMode; const oldCooldown = project.hwidResetCooldown;
            project.name = name; project.webhookUrl = webhook; project.freeMode = window.tempFreeMode; project.hwidResetCooldown = parseInt(cooldown);
            try { await syncToServer(); closeModal(); showToast('Project updated'); renderApp(); } 
            catch (err) { project.name = oldName; project.webhookUrl = oldWebhook; project.freeMode = oldMode; project.hwidResetCooldown = oldCooldown; }
        }

        async function deleteProject(projectId) {
            const pIndex = state.projects.findIndex(p => p.id === projectId);
            const pStore = state.projects[pIndex];
            state.projects.splice(pIndex, 1);
            try { await syncToServer(); closeModal(); showToast('Project deleted'); renderApp(); } 
            catch (err) { state.projects.splice(pIndex, 0, pStore); }
        }

        function openAddScriptModal(projectId) {
            state.draftScript = { projectId, file: null, code: null };
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4 overflow-y-auto">
                <div class="bg-surface-800 border border-zinc-800/80 p-6 rounded-2xl w-full max-w-lg shadow-2xl modal-animate ring-1 ring-white/5 my-8">
                    <h3 class="text-xl font-bold text-white mb-5 flex items-center gap-2"><i data-lucide="file-code" class="text-brand-400 w-5 h-5"></i> Add New Script</h3>
                    <div class="space-y-5">
                        <div><label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase">Custom Script Name</label><input type="text" id="input-as-name" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none"></div>
                        <div><label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase">Roblox Game ID</label><input type="text" id="input-as-gameid" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none font-mono" placeholder="Leave empty for Universal Script"></div>
                        <div><label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase">Upload File</label>
                            <div id="drop-zone" class="border-2 border-dashed border-zinc-700 rounded-xl p-8 text-center bg-[#0a0a0c] hover:bg-surface-800 hover:border-brand-500/50 cursor-pointer relative"><input type="file" accept=".lua" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="handleFileSelect(event)"><div class="bg-surface-800 w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-3"><i data-lucide="upload-cloud" class="w-6 h-6 text-brand-400"></i></div><p class="text-sm text-zinc-300 font-medium" id="drop-text">Drag & drop your file here</p></div>
                        </div>
                    </div>
                    <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-zinc-800/50"><button onclick="closeModal()" class="px-5 py-2.5 text-sm font-medium text-zinc-400 hover:text-white hover:bg-surface-700 rounded-lg">Cancel</button><button onclick="submitAddScript()" class="bg-brand-600 hover:bg-brand-500 text-white px-6 py-2.5 rounded-lg text-sm">Upload Script</button></div>
                </div>
            </div>`;
            lucide.createIcons(); setupDragDrop();
        }

        function handleFileSelect(e) { handleFiles(e.target.files); }
        function handleFiles(files) {
            if(files && files.length > 0) {
                const file = files.item(0); 
                if(file && file.name && file.name.toLowerCase().endsWith('.lua')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        state.draftScript.file = file; state.draftScript.code = event.target.result; 
                        document.getElementById('drop-text').innerHTML = `<span class="text-emerald-400 font-semibold bg-emerald-500/10 px-3 py-1 rounded-full border border-emerald-500/20">${file.name}</span>`;
                    };
                    reader.readAsText(file);
                } else { showToast('Only .lua files', 'error'); }
            }
        }
        function setupDragDrop() {
            const dropZone = document.getElementById('drop-zone');
            if(!dropZone) return;
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => dropZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, false));
            ['dragenter', 'dragover'].forEach(evt => dropZone.addEventListener(evt, () => dropZone.classList.add('border-brand-500', 'bg-brand-500/5'), false));
            ['dragleave', 'drop'].forEach(evt => dropZone.addEventListener(evt, () => dropZone.classList.remove('border-brand-500', 'bg-brand-500/5'), false));
            dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
        }

        async function submitAddScript() {
            const name = document.getElementById('input-as-name').value.trim();
            const gameId = document.getElementById('input-as-gameid').value.trim();
            const { file, code, projectId } = state.draftScript;
            if(!name || !file || !code) return showToast('Please provide a name and select a valid Lua file.', 'error');

            if (typeof luaparse !== 'undefined') {
                try { luaparse.parse(code, { comments: false }); } 
                catch (err) {
                    const proceed = confirm(`Syntax Error:\\n\\n${err.message}\\n\\nUpload anyway?`);
                    if (!proceed) return;
                }
            }

            const project = state.projects.find(p => p.id === projectId);
            const scriptId = await generateSHA256(name + gameId + "script");
            
            const newScript = { id: scriptId, name, gameId, status: 'Active', version: 'v0.0.1', date: getShortDate(), fileName: file.name, code, executions: 0, executionHistory: {} };
            project.scripts.push(newScript);
            
            try { await syncToServer(); closeModal(); showToast('Script uploaded'); renderApp(); } 
            catch(err) { project.scripts.pop(); }
        }

        function openEditScriptModal(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            const script = project.scripts.find(s => s.id === scriptId);
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div class="bg-surface-800 border border-zinc-800/80 p-6 rounded-2xl w-full max-w-lg shadow-2xl modal-animate ring-1 ring-white/5">
                    <div class="flex justify-between items-center mb-5"><h3 class="text-xl font-bold text-white flex items-center gap-2"><i data-lucide="edit" class="text-brand-400 w-5 h-5"></i> Edit Script</h3><span class="px-2.5 py-1 rounded text-xs font-bold bg-brand-500/10 text-brand-400 border border-brand-500/20">${script.version}</span></div>
                    <div class="space-y-4">
                        <div><label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase">Script Name</label><input type="text" id="input-es-name" value="${script.name}" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none"></div>
                        <div><label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase">Game ID</label><input type="text" id="input-es-gameid" value="${script.gameId || ''}" placeholder="Leave empty for Universal Script" class="w-full bg-[#0a0a0c] border border-zinc-700 rounded-lg p-3 text-white focus:border-brand-500 outline-none font-mono"></div>
                        <div><label class="block text-xs font-bold text-zinc-400 mb-1.5 uppercase">Reupload File <span class="text-brand-400 normal-case">(Bumps Version)</span></label><input type="file" id="input-es-file" accept=".lua" class="w-full text-sm text-zinc-400 file:mr-4 file:py-2.5 file:px-4 file:rounded-lg file:border-0 file:bg-surface-700 file:text-white hover:file:bg-surface-600 bg-[#0a0a0c] border border-zinc-700 rounded-lg outline-none cursor-pointer"></div>
                    </div>
                    <div class="flex justify-end gap-3 mt-8 pt-4 border-t border-zinc-800/50"><button onclick="closeModal()" class="px-5 py-2.5 text-sm font-medium text-zinc-400 hover:text-white hover:bg-surface-700 rounded-lg">Cancel</button><button onclick="saveEditScript('${projectId}', '${scriptId}')" class="bg-brand-600 hover:bg-brand-500 text-white px-6 py-2.5 rounded-lg text-sm">Save Changes</button></div>
                </div>
            </div>`;
            lucide.createIcons();
        }

        async function saveEditScript(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            const script = project.scripts.find(s => s.id === scriptId);
            const newName = document.getElementById('input-es-name').value.trim();
            const newGameId = document.getElementById('input-es-gameid').value.trim();
            const fileInput = document.getElementById('input-es-file');

            if(!newName) return showToast('Script name cannot be empty', 'error');

            const oldState = {...script};
            script.name = newName; script.gameId = newGameId;

            const processSave = async (codeToCheck) => {
                if (codeToCheck && typeof luaparse !== 'undefined') {
                    try { luaparse.parse(codeToCheck, { comments: false }); } 
                    catch (err) {
                        const proceed = confirm(`Syntax Error:\\n\\n${err.message}\\n\\nSave anyway?`);
                        if (!proceed) { Object.assign(script, oldState); return; }
                    }
                }
                try { await syncToServer(); closeModal(); showToast('Script updated'); renderApp(); } 
                catch (err) { Object.assign(script, oldState); }
            };

            if(fileInput.files && fileInput.files.length > 0) {
                const file = fileInput.files.item(0); 
                if(file && file.name && file.name.toLowerCase().endsWith('.lua')) {
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        script.version = incrementVersion(script.version);
                        script.fileName = file.name; script.code = event.target.result; script.date = getShortDate();
                        await processSave(event.target.result);
                    };
                    reader.readAsText(file);
                    return;
                }
            }
            await processSave(null);
        }

        async function toggleScriptStatusDirect(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            const script = project.scripts.find(s => s.id === scriptId);
            script.status = script.status === 'Active' ? 'Inactive' : 'Active';
            try { await syncToServer(); renderApp(); showToast(`Script ${script.status === 'Active' ? 'enabled' : 'disabled'}`); } 
            catch (err) { script.status = script.status === 'Active' ? 'Inactive' : 'Active'; }
        }

        async function deleteScript(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            const sIndex = project.scripts.findIndex(s => s.id === scriptId);
            const sStore = project.scripts[sIndex];
            project.scripts.splice(sIndex, 1);
            try { await syncToServer(); showToast('Script deleted'); renderApp(); } 
            catch (err) { project.scripts.splice(sIndex, 0, sStore); }
        }

        function openCustomLoaderModal(projectId) {
            const project = state.projects.find(p => p.id === projectId);
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/70 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div class="bg-[#111113] border border-zinc-800/80 p-0 rounded-2xl w-full max-w-3xl shadow-2xl modal-animate overflow-hidden">
                    <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800/80 bg-surface-900/50">
                        <h3 class="text-sm font-bold text-white flex items-center gap-2"><i data-lucide="code" class="text-zinc-400 w-4 h-4"></i> Loader Code (Lua)</h3>
                        <div class="flex items-center gap-2">
                            <button onclick="copyLoaderLink('${projectId}')" class="px-3 py-1.5 text-xs text-zinc-300 hover:text-white bg-surface-800 rounded-md border border-zinc-700/50">Copy URL</button>
                            <button onclick="autoGenerateLoader('${projectId}')" class="px-3 py-1.5 text-xs text-brand-400 bg-brand-500/10 rounded-md border border-brand-500/20">Auto Generate</button>
                            <button onclick="saveLoaderCode('${projectId}')" class="px-3 py-1.5 text-xs text-white bg-brand-600 rounded-md shadow-lg shadow-brand-500/20">Save</button>
                            <button onclick="closeModal()" class="p-1.5 text-zinc-500 hover:text-white rounded-md ml-2"><i data-lucide="x" class="w-4 h-4"></i></button>
                        </div>
                    </div>
                    <div class="p-4 bg-[#0a0a0c]"><textarea id="loader-code-textarea">${project.loaderCode || ""}</textarea></div>
                </div>
            </div>`;
            lucide.createIcons();
            setTimeout(() => { window.loaderEditor = CodeMirror.fromTextArea(document.getElementById('loader-code-textarea'), { mode: 'lua', theme: 'luauauth', lineNumbers: false, matchBrackets: true, indentUnit: 4 }); }, 10);
        }

        function autoGenerateLoader(projectId) {
            if (window.loaderEditor) {
                const project = state.projects.find(p => p.id === projectId);
                let scriptsTable = "";
                if (project && project.scripts) {
                    project.scripts.forEach(s => {
                        if (s.gameId && s.gameId !== "") { scriptsTable += `    [${s.gameId}] = "${window.location.origin}/raw/${projectId}/${s.id}",\n`; } 
                        else { scriptsTable += `    ["Universal"] = "${window.location.origin}/raw/${projectId}/${s.id}",\n`; }
                    });
                }
                let authSnippet = project.freeMode === false ? `\nlocal AuthKey = getgenv().LuauAuthKey or ""\nlocal hwid = (gethwid and gethwid()) or game:GetService("RbxAnalyticsService"):GetClientId()\n` : "";
                let callSnippet = project.freeMode === false ? `loadstring(game:HttpGet(Script .. "?key=" .. AuthKey .. "&hwid=" .. hwid))()` : `loadstring(game:HttpGet(Script))()`;
                window.loaderEditor.setValue(`local ProjectId = "${projectId}"\nlocal Scripts = {\n${scriptsTable}}\n\nlocal Script = Scripts[game.GameId] or Scripts["Universal"]\nif Script then${authSnippet}\n    ${callSnippet}\nelse\n    warn("Luau-Auth: No script found")\nend`);
            }
        }

        function copyLoaderLink(projectId) { copyToClipboard(`loadstring(game:HttpGet('${window.location.origin}/loader/${projectId}'))()`, 'Custom Loader URL copied!'); }

        async function saveLoaderCode(projectId) {
            const project = state.projects.find(p => p.id === projectId);
            const oldVal = project.loaderCode; project.loaderCode = window.loaderEditor.getValue();
            try { await syncToServer(); closeModal(); showToast('Loader code saved'); } 
            catch (err) { project.loaderCode = oldVal; }
        }

        initApp();
    </script>
</body>
</html>
