<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luau-Auth | Script Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>
    <script src="https://unpkg.com/luaparse@0.3.1/luaparse.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#4f46e5', 600: '#4338ca' } }
                }
            }
        };
    </script>
    <style>
        body { background-color: #050505; color: #e4e4e7; overflow: hidden; display: flex; height: 100vh; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
        
        .panel-card { background-color: #0e0e11; border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 0.75rem; }
        .solid-input { background: #000000; border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 0.5rem; padding: 0.6rem 1rem; outline: none; width: 100%; font-size: 0.875rem; }
        .solid-input:focus { border-color: #4f46e5; }
        .primary-btn { background-color: #4f46e5; color: white; border-radius: 0.5rem; transition: 0.2s; font-weight: 500; }
        .primary-btn:hover { background-color: #4338ca; }
        
        .cm-s-luauauth.CodeMirror { background: #000; color: #e2e8f0; border-radius: 0.5rem; padding: 1rem; font-family: monospace; font-size: 13px; border: 1px solid rgba(255,255,255,0.1); height: 300px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .modal-animate { animation: fadeIn 0.3s ease forwards; }

        .toast { position: fixed; bottom: 20px; right: 20px; background: #18181b; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px 20px; border-radius: 8px; z-index: 9999; display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <aside id="main-sidebar" class="w-64 bg-[#09090b] border-r border-white/5 flex flex-col z-20 hidden">
        <div class="px-6 py-6 border-b border-white/5">
            <div class="flex items-center gap-3">
                <i data-lucide="shield" class="w-6 h-6 text-[#4f46e5]"></i>
                <div>
                    <h1 class="text-base font-bold text-white tracking-tight">Sanctuary</h1>
                    <p class="text-[10px] text-zinc-500 font-medium tracking-wide">Auth & Service Management</p>
                </div>
            </div>
        </div>
        
        <nav id="sidebar-nav" class="flex-1 px-4 py-6 space-y-1 overflow-y-auto">
            <button onclick="setTab('dashboard')" id="tab-dashboard" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors"><i data-lucide="activity" class="w-4 h-4"></i> Dashboard</button>
            <button onclick="setTab('projects')" id="tab-projects" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors"><i data-lucide="folder" class="w-4 h-4"></i> Projects</button>
            <button onclick="setTab('keys')" id="tab-keys" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors"><i data-lucide="users" class="w-4 h-4"></i> Users</button>
            <button onclick="setTab('settings')" id="tab-settings" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors"><i data-lucide="megaphone" class="w-4 h-4"></i> Ads</button>
        </nav>
    </aside>

    <main class="flex-1 overflow-y-auto relative z-10 flex flex-col w-full min-w-0 bg-[#050505]">
        <div id="top-bar" class="w-full px-8 py-6 border-b border-white/5 hidden bg-[#050505]">
            <div class="flex justify-between items-start">
                <div>
                    <p id="top-bar-breadcrumbs" class="text-xs text-zinc-500 font-medium mb-1">Sanctuary / Dashboard</p>
                    <h2 id="top-bar-title" class="text-2xl font-bold text-white tracking-tight">Dashboard</h2>
                    <p id="top-bar-subtitle" class="text-xs text-zinc-400 font-medium mt-1">Monitor script execution performance and system health in real-time</p>
                </div>
                <div class="flex items-center gap-4">
                    <i data-lucide="bell" class="w-5 h-5 text-zinc-400 hover:text-white cursor-pointer transition-colors" onclick="showToast('Notifications caught up')"></i>
                    <div id="user-avatar-top" class="bg-[#2563eb] w-8 h-8 rounded text-white flex items-center justify-center font-bold text-xs cursor-pointer shadow-sm" onclick="openLogoutModal()"></div>
                </div>
            </div>
        </div>
        <div id="main-content" class="p-8 max-w-6xl mx-auto flex-1 w-full">
            <div class="flex items-center justify-center h-full"><i data-lucide="loader-2" class="w-8 h-8 animate-spin text-brand-500"></i></div>
        </div>
    </main>

    <div id="modal-container" class="z-50 relative"></div>
    <div id="toast-container"></div>

    <script>
        var state = {
            activeTab: 'dashboard',
            projects: [],
            adminKeys: {},
            user: null,
            apiKey: localStorage.getItem('sanctuary_api_key') || "",
            draftScript: { projectId: null, file: null, code: null }
        };

        window.copyScriptLoader = function(pId, sId) {
            var code = "loadstring(game:HttpGet('" + window.location.origin + "/raw/" + pId + "/" + sId + "'))()";
            copyToClipboard(code, 'Copied Script Loader!');
        };

        function showToast(message) {
            var container = document.getElementById('toast-container');
            var toast = document.createElement('div');
            toast.className = "toast";
            toast.innerHTML = "<i data-lucide='check-circle' class='w-4 h-4 text-emerald-500'></i> <span>" + message + "</span>";
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(function() { toast.remove(); }, 3000);
        }

        function copyToClipboard(text, successMsg) {
            var textArea = document.createElement("textarea"); 
            textArea.value = text; 
            textArea.style.position = "fixed"; 
            document.body.appendChild(textArea); 
            textArea.focus(); 
            textArea.select();
            try { 
                document.execCommand('copy'); 
                showToast(successMsg || 'Copied!'); 
            } catch (err) {}
            document.body.removeChild(textArea);
        }

        async function generateSHA256(text) {
            var msgBuffer = new TextEncoder().encode(text + Date.now().toString());
            var hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            var hashArray = Array.from(new Uint8Array(hashBuffer));
            var hashHex = "";
            for (var i=0; i<hashArray.length; i++) {
                hashHex += hashArray[i].toString(16).padStart(2, '0');
            }
            return hashHex;
        }

        function incrementVersion(ver) {
            var parts = ver.replace('v', '').split('.');
            var patch = parseInt(parts.pop() || 0) + 1; 
            parts.push(patch); 
            return "v" + parts.join('.');
        }
        
        function getShortDate() {
            var months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            var today = new Date(); 
            return months[today.getMonth()] + " " + today.getDate() + ", " + today.getFullYear();
        }

        function generateHWIDKey() {
            var array = new Uint8Array(12);
            crypto.getRandomValues(array);
            var hex = "";
            for(var i=0; i<array.length; i++){ hex += array[i].toString(16).padStart(2, '0'); }
            return hex;
        }

        async function initApp() {
            var userData = localStorage.getItem('sanctuary_user');
            if (userData) {
                state.user = JSON.parse(userData);
                document.getElementById('main-sidebar').classList.remove('hidden');
                document.getElementById('top-bar').classList.remove('hidden');
                
                document.getElementById('user-avatar-top').innerText = state.user.username.substring(0, 2).toUpperCase();
                
                await loadFromServer();
                setTab('dashboard');
            } else {
                renderLoginPanel();
            }
            lucide.createIcons();
        }

        function renderLoginPanel() {
            var h = "";
            h += "<div class='flex items-center justify-center h-[80vh]'>";
            h += "<div class='panel-card p-10 max-w-sm w-full text-center modal-animate'>";
            h += "<div class='w-14 h-14 bg-[#18181b] border border-white/5 text-[#4f46e5] rounded-xl flex items-center justify-center mx-auto mb-6'><i data-lucide='shield' class='w-6 h-6'></i></div>";
            h += "<h2 class='text-xl font-bold text-white mb-2'>Sanctuary API</h2>";
            h += "<p class='text-zinc-500 text-xs mb-8'>Securely authenticate via Discord.</p>";
            h += "<a href='/api/auth/discord' class='w-full flex items-center justify-center gap-3 primary-btn py-2.5 px-4 text-sm'><i data-lucide='log-in' class='w-4 h-4'></i> Login with Discord</a>";
            h += "</div></div>";
            document.getElementById('main-content').innerHTML = h;
            lucide.createIcons();
        }

        async function saveApiKey() {
            var key = document.getElementById('input-user-apikey').value.trim();
            if(!key) return showToast('Please enter an API key');
            try {
                var res = await fetch('/api/link-key', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: key, discordId: state.user.id, discordName: state.user.username })
                });
                var data = await res.json();
                if (data.error) throw new Error(data.error);
                
                state.apiKey = key; 
                localStorage.setItem('sanctuary_api_key', key);
                showToast('API Key saved!');
            } catch (err) { showToast('Error saving key'); }
        }

        async function loadFromServer() {
            try {
                var res = await fetch("/api/sync?discordId=" + state.user.id);
                if (res.ok) {
                    var data = await res.json();
                    if (data.projects) {
                        state.projects = data.projects;
                    }
                }
            } catch (err) {} 
            finally { renderApp(); }
        }

        async function syncToServer() {
            try {
                await fetch('/api/sync', {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projects: state.projects, apiKey: state.apiKey, discordId: state.user.id })
                });
            } catch (err) { showToast('Failed to save.'); }
        }

        function openLogoutModal() {
            var h = "";
            h += "<div class='fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4'>";
            h += "<div class='panel-card p-8 w-full max-w-sm modal-animate text-center'>";
            h += "<div class='w-12 h-12 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4'><i data-lucide='log-out' class='w-5 h-5'></i></div>";
            h += "<h3 class='text-lg font-bold text-white mb-2'>Sign Out</h3>";
            h += "<p class='text-xs text-zinc-400 mb-8'>Are you sure you want to sign out?</p>";
            h += "<div class='flex gap-3'>";
            h += "<button onclick='closeModal()' class='flex-1 px-4 py-2 bg-[#121214] border border-white/5 text-white rounded text-sm'>Cancel</button>";
            h += "<button onclick='confirmLogout()' class='flex-1 px-4 py-2 bg-red-500 text-white rounded text-sm font-medium'>Sign Out</button>";
            h += "</div></div></div>";
            document.getElementById('modal-container').innerHTML = h;
            lucide.createIcons();
        }

        function confirmLogout() {
            localStorage.removeItem('sanctuary_user'); 
            localStorage.removeItem('sanctuary_api_key');
            window.location.reload();
        }

        async function setTab(tab) { 
            state.activeTab = tab; 
            if (tab === 'keys' || tab === 'dashboard') await loadFromServer();
            else renderApp();
        }

        function renderApp() {
            if (!state.user) return;

            var tabData = {
                'dashboard': { title: 'Dashboard', sub: 'Monitor script execution performance and system health in real-time' },
                'projects': { title: 'Projects', sub: 'Manage your scripts and project configurations' },
                'keys': { title: 'Users', sub: 'Manage API keys and active user sessions' },
                'settings': { title: 'Ads', sub: 'Configure dashboard settings and analytics' }
            };
            
            var info = tabData[state.activeTab];
            document.getElementById('top-bar-breadcrumbs').innerText = "Sanctuary / " + info.title;
            document.getElementById('top-bar-title').innerText = info.title;
            document.getElementById('top-bar-subtitle').innerText = info.sub;

            var tabIds = ['dashboard', 'projects', 'keys', 'settings'];
            for(var i=0; i<tabIds.length; i++){
                var t = tabIds[i];
                var el = document.getElementById("tab-" + t);
                if (el) {
                    if (state.activeTab === t) {
                        el.className = "w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors bg-[#1a1b2e] text-[#6366f1] border-l-2 border-[#6366f1]";
                    } else {
                        el.className = "w-full flex items-center gap-3 px-4 py-2.5 rounded-lg text-sm font-medium transition-colors text-zinc-400 hover:bg-white/5 hover:text-white border-l-2 border-transparent";
                    }
                }
            }

            var main = document.getElementById('main-content');
            
            if (state.activeTab === 'dashboard') renderDashboard(main);
            else if (state.activeTab === 'projects') renderProjects(main);
            else if (state.activeTab === 'keys') renderKeys(main);
            else renderSettings(main);
            
            lucide.createIcons();
        }

        function renderDashboard(mainContainer) {
            var totalExecs = 0;
            var todayExecs = 0;
            var totalUsers = 0;
            
            var todayStr = new Date().toISOString().split('T');

            for(var i=0; i<state.projects.length; i++){
                var p = state.projects[i];
                totalUsers += (p.hwidKeys ? p.hwidKeys.length : 0);
                for(var j=0; j<p.scripts.length; j++){
                    var s = p.scripts[j];
                    totalExecs += (s.executions || 0);
                    if(s.executionHistory && s.executionHistory[todayStr]) {
                        todayExecs += s.executionHistory[todayStr];
                    }
                }
            }

            var h = "";
            h += "<div class='grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-8 modal-animate'>";
            
            h += "<div class='panel-card p-5 relative'>";
            h += "<p class='text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1'>Total Executions</p>";
            h += "<h3 class='text-2xl font-bold text-white'>" + totalExecs.toLocaleString() + "</h3>";
            h += "<p class='text-[10px] text-zinc-500 mt-1'>Total script executions</p>";
            h += "<i data-lucide='activity' class='absolute top-5 right-5 w-4 h-4 text-blue-500'></i></div>";

            h += "<div class='panel-card p-5 relative'>";
            h += "<p class='text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1'>Today Executions</p>";
            h += "<h3 class='text-2xl font-bold text-white'>" + todayExecs.toLocaleString() + "</h3>";
            h += "<p class='text-[10px] text-zinc-500 mt-1'>Executions in last 24h</p>";
            h += "<i data-lucide='activity' class='absolute top-5 right-5 w-4 h-4 text-blue-500'></i></div>";

            h += "<div class='panel-card p-5 relative'>";
            h += "<p class='text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1'>Total Users</p>";
            h += "<h3 class='text-2xl font-bold text-white'>" + totalUsers + "</h3>";
            h += "<p class='text-[10px] text-zinc-500 mt-1'>Active users across projects</p>";
            h += "<i data-lucide='users' class='absolute top-5 right-5 w-4 h-4 text-green-500'></i></div>";

            h += "<div class='panel-card p-5 relative'>";
            h += "<p class='text-[10px] font-bold text-zinc-500 uppercase tracking-widest mb-1'>Threats Blocked</p>";
            h += "<h3 class='text-2xl font-bold text-white'>0</h3>";
            h += "<p class='text-[10px] text-zinc-500 mt-1'>Blacklisted users</p>";
            h += "<i data-lucide='alert-triangle' class='absolute top-5 right-5 w-4 h-4 text-red-500'></i></div>";
            
            h += "</div>";

            mainContainer.innerHTML = h;
        }

        function renderProjects(mainContainer) {
            var h = "";
            h += "<div class='flex justify-end mb-6 modal-animate'>";
            h += "<button onclick='openCreateProjectModal()' class='bg-[#4f46e5] text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 hover:bg-[#4338ca] transition-colors'><i data-lucide='plus' class='w-4 h-4'></i> Create Project</button>";
            h += "</div>";
            
            h += "<div class='space-y-4 modal-animate'>";
            
            if (state.projects.length === 0) {
                h += "<div class='text-center py-20 border border-dashed border-white/10 rounded-xl panel-card w-full'><h3 class='text-sm font-medium text-zinc-500'>No projects yet</h3></div>";
            } else {
                for(var i=0; i<state.projects.length; i++) {
                    var p = state.projects[i];
                    h += "<div class='panel-card overflow-hidden w-full block transition-all'>";
                    h += "<div class='p-4 sm:p-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4 cursor-pointer hover:bg-white/[0.02] transition-colors' onclick='toggleProject(\"" + p.id + "\")'>";
                    
                    h += "<div class='flex items-center gap-4'>";
                    h += "<i data-lucide='" + (p.expanded ? 'chevron-down' : 'chevron-right') + "' class='text-blue-500 w-5 h-5 transition-transform'></i>";
                    h += "<div><h3 class='text-base font-bold text-white'>" + p.name + "</h3><p class='text-xs text-zinc-500 font-mono mt-0.5'>" + p.id.substring(0,24) + "...</p></div>";
                    h += "</div>";

                    h += "<div class='flex items-center gap-3'>";
                    h += "<button onclick='event.stopPropagation(); openProjectSettings(\"" + p.id + "\")' class='p-1.5 text-zinc-400 hover:text-white transition-colors'><i data-lucide='settings' class='w-5 h-5'></i></button>";
                    h += "<button onclick='event.stopPropagation(); openCustomLoaderModal(\"" + p.id + "\")' class='border border-green-500/30 text-green-500 bg-green-500/5 hover:bg-green-500/10 px-3 py-1.5 rounded text-[10px] font-bold flex items-center gap-2 transition-colors uppercase tracking-wider'><i data-lucide='code' class='w-3.5 h-3.5'></i> Custom Loader</button>";
                    h += "<button onclick='event.stopPropagation(); openAddScriptModal(\"" + p.id + "\")' class='bg-[#2563eb] hover:bg-blue-600 text-white px-3 py-1.5 rounded text-[10px] font-bold flex items-center gap-2 transition-colors uppercase tracking-wider'><i data-lucide='plus' class='w-3.5 h-3.5'></i> Add Script</button>";
                    h += "</div>";
                    h += "</div>";

                    if (p.expanded) {
                        h += "<div class='p-4 sm:p-6 bg-black/20 border-t border-white/5 space-y-4'>";
                        if(p.scripts.length === 0) {
                            h += "<p class='text-xs text-zinc-500 text-center py-4'>No scripts added.</p>";
                        } else {
                            for(var j=0; j<p.scripts.length; j++) {
                                var s = p.scripts[j];
                                h += "<div class='flex flex-col md:flex-row md:items-center justify-between p-4 bg-black/40 border border-white/5 rounded-xl hover:bg-white/[0.02] transition-colors gap-4'>";
                                
                                h += "<div class='flex items-start md:items-center gap-4'>";
                                h += "<button onclick='toggleScriptStatusDirect(\"" + p.id + "\", \"" + s.id + "\")' class='relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none " + (s.status === 'Active' ? 'bg-[#4f46e5]' : 'bg-zinc-700') + " transition-colors duration-200 mt-1 md:mt-0'>";
                                h += "<span class='pointer-events-none absolute left-[2px] inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 " + (s.status === 'Active' ? 'translate-x-[16px]' : 'translate-x-0') + "'></span></button>";
                                
                                h += "<div class='flex flex-col md:flex-row md:items-center gap-2 md:gap-6'>";
                                h += "<div><h4 class='font-bold text-white text-sm'>" + s.name + "</h4><p class='text-[10px] text-zinc-500 font-mono mt-0.5'>" + s.id.substring(0,12) + "</p></div>";
                                h += "<span class='px-2 py-0.5 rounded text-[10px] font-bold " + (s.status === 'Active' ? 'bg-green-500/20 text-green-500' : 'bg-zinc-500/20 text-zinc-400') + " uppercase tracking-wider w-max'>" + (s.status === 'Active' ? 'Active' : 'Inactive') + "</span>";
                                h += "<span class='text-xs text-zinc-400 font-mono'>" + s.version + "</span>";
                                h += "<span class='text-xs text-zinc-500'>" + s.date + "</span>";
                                h += "</div></div>";

                                h += "<div class='flex items-center gap-2 w-full md:w-auto mt-2 md:mt-0'>";
                                h += "<button onclick='copyScriptLoader(\"" + p.id + "\", \"" + s.id + "\")' class='flex-1 md:flex-none border border-green-500/30 text-green-500 hover:bg-green-500/10 px-3 py-1.5 rounded flex items-center justify-center gap-2 text-[10px] font-bold uppercase transition-colors'><i data-lucide='copy' class='w-3.5 h-3.5'></i> Copy</button>";
                                h += "<button onclick='openEditScriptModal(\"" + p.id + "\", \"" + s.id + "\")' class='flex-1 md:flex-none border border-blue-500/30 text-blue-400 hover:bg-blue-500/10 px-3 py-1.5 rounded flex items-center justify-center gap-2 text-[10px] font-bold uppercase transition-colors'><i data-lucide='edit-2' class='w-3.5 h-3.5'></i> Edit</button>";
                                h += "<button onclick='deleteScript(\"" + p.id + "\", \"" + s.id + "\")' class='flex-1 md:flex-none border border-red-500/30 text-red-400 hover:bg-red-500/10 px-3 py-1.5 rounded flex items-center justify-center gap-2 text-[10px] font-bold uppercase transition-colors'><i data-lucide='trash-2' class='w-3.5 h-3.5'></i> Delete</button>";
                                h += "</div></div>";
                            }
                        }
                        h += "</div>";
                    }
                    h += "</div>";
                }
            }
            h += "</div>";
            mainContainer.innerHTML = h;
        }

        function toggleProject(id) {
            for(var i=0; i<state.projects.length; i++){
                if(state.projects[i].id === id) {
                    state.projects[i].expanded = !state.projects[i].expanded;
                    renderProjects(document.getElementById('main-content'));
                    lucide.createIcons();
                    return;
                }
            }
        }

        function closeModal() { document.getElementById('modal-container').innerHTML = ''; }

        function openCreateProjectModal() {
            var h = "";
            h += "<div class='fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4'>";
            h += "<div class='panel-card p-6 w-full max-w-md modal-animate'>";
            h += "<div class='flex justify-between items-center mb-6'><h3 class='text-lg font-bold text-white'>Create Project</h3><button onclick='closeModal()' class='text-zinc-500 hover:text-white'><i data-lucide='x' class='w-5 h-5'></i></button></div>";
            h += "<div><label class='block text-xs font-bold text-zinc-400 mb-2 uppercase tracking-wider'>Project Name</label><input type='text' id='input-cp-name' class='solid-input'></div>";
            h += "<div class='flex justify-end gap-3 mt-6'><button onclick='closeModal()' class='px-4 py-2 text-sm font-medium text-zinc-400 hover:text-white'>Cancel</button><button onclick='submitCreateProject()' class='primary-btn px-4 py-2 text-sm'>Create</button></div>";
            h += "</div></div>";
            document.getElementById('modal-container').innerHTML = h;
            lucide.createIcons();
        }

        async function submitCreateProject() {
            var name = document.getElementById('input-cp-name').value.trim();
            if (!name) return showToast('Please enter a project name');
            var id = await generateSHA256(name);
            state.projects.push({ id: id, name: name, expanded: true, loaderCode: "", webhookUrl: "", freeMode: true, hwidResetCooldown: 24, hwidKeys: [], scripts: [] });
            await syncToServer(); 
            closeModal(); 
            showToast('Project created'); 
            renderProjects(document.getElementById('main-content'));
            lucide.createIcons();
        }

        function openProjectSettings(projectId) {
            var p = null;
            for(var i=0; i<state.projects.length; i++){ if(state.projects[i].id === projectId) p = state.projects[i]; }
            
            var h = "";
            h += "<div class='fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4'>";
            h += "<div class='panel-card p-6 w-full max-w-md modal-animate'>";
            h += "<div class='flex justify-between items-center mb-6'><h3 class='text-lg font-bold text-white'>Project Settings</h3><button onclick='closeModal()' class='text-zinc-500 hover:text-white'><i data-lucide='x' class='w-5 h-5'></i></button></div>";
            h += "<div class='space-y-4'>";
            h += "<div><label class='block text-xs font-bold text-zinc-400 mb-2'>PROJECT NAME</label><input type='text' id='ps-name' value='" + p.name + "' class='solid-input'></div>";
            h += "<div><label class='block text-xs font-bold text-zinc-400 mb-2'>WEBHOOK URL</label><input type='text' id='ps-web' value='" + (p.webhookUrl || '') + "' class='solid-input'></div>";
            h += "</div>";
            h += "<div class='flex items-center justify-between mt-6 pt-6 border-t border-white/5'>";
            h += "<button onclick='deleteProject(\"" + projectId + "\")' class='text-red-500 hover:text-red-400 text-sm font-medium flex items-center gap-2'><i data-lucide='trash-2' class='w-4 h-4'></i> Delete</button>";
            h += "<div class='flex gap-3'><button onclick='closeModal()' class='px-4 py-2 text-sm text-zinc-400 hover:text-white'>Cancel</button><button onclick='saveProjectSettings(\"" + projectId + "\")' class='primary-btn px-4 py-2 text-sm'>Save</button></div>";
            h += "</div></div></div>";
            document.getElementById('modal-container').innerHTML = h;
            lucide.createIcons();
        }

        async function saveProjectSettings(projectId) {
            var name = document.getElementById('ps-name').value.trim();
            var web = document.getElementById('ps-web').value.trim();
            if(!name) return;
            for(var i=0; i<state.projects.length; i++){ 
                if(state.projects[i].id === projectId) {
                    state.projects[i].name = name;
                    state.projects[i].webhookUrl = web;
                }
            }
            await syncToServer(); closeModal(); showToast('Saved'); renderProjects(document.getElementById('main-content')); lucide.createIcons();
        }

        async function deleteProject(projectId) {
            if(!confirm("Delete project?")) return;
            var newArr = [];
            for(var i=0; i<state.projects.length; i++){ 
                if(state.projects[i].id !== projectId) newArr.push(state.projects[i]);
            }
            state.projects = newArr;
            await syncToServer(); closeModal(); showToast('Deleted'); renderProjects(document.getElementById('main-content')); lucide.createIcons();
        }

        function openAddScriptModal(projectId) {
            state.tempStore = { pid: projectId, code: "" };
            var h = "";
            h += "<div class='fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4'>";
            h += "<div class='panel-card p-6 w-full max-w-md modal-animate'>";
            h += "<div class='flex justify-between items-center mb-6'><h3 class='text-lg font-bold text-white'>Add Script</h3><button onclick='closeModal()' class='text-zinc-500 hover:text-white'><i data-lucide='x' class='w-5 h-5'></i></button></div>";
            h += "<div class='space-y-4'>";
            h += "<div><label class='block text-xs font-bold text-zinc-400 mb-2 uppercase'>Script Name</label><input type='text' id='as-name' class='solid-input'></div>";
            h += "<div><label class='block text-xs font-bold text-zinc-400 mb-2 uppercase'>Game ID (Empty for Universal)</label><input type='text' id='as-gid' class='solid-input font-mono'></div>";
            h += "<div><label class='block text-xs font-bold text-zinc-400 mb-2 uppercase'>Lua Code</label><textarea id='as-code' class='solid-input h-32 font-mono text-xs'></textarea></div>";
            h += "</div>";
            h += "<div class='flex justify-end gap-3 mt-6'><button onclick='closeModal()' class='px-4 py-2 text-sm text-zinc-400 hover:text-white'>Cancel</button><button onclick='submitAddScript()' class='primary-btn px-4 py-2 text-sm'>Upload</button></div>";
            h += "</div></div>";
            document.getElementById('modal-container').innerHTML = h;
            lucide.createIcons();
        }

        async function submitAddScript() {
            var n = document.getElementById('as-name').value.trim();
            var g = document.getElementById('as-gid').value.trim();
            var c = document.getElementById('as-code').value;
            var pid = state.tempStore.pid;
            if(!n || !c) return showToast('Name and code required');

            var sid = await generateSHA256(n + Date.now());
            for(var i=0; i<state.projects.length; i++){
                if(state.projects[i].id === pid){
                    state.projects[i].scripts.push({ id: sid, name: n, gameId: g, status: 'Active', version: 'v1.0.0', date: getShortDate(), code: c, executions: 0, executionHistory: {} });
                }
            }
            await syncToServer(); closeModal(); showToast('Script added'); renderProjects(document.getElementById('main-content')); lucide.createIcons();
        }

        function openEditScriptModal(pid, sid) {
            var s = null;
            for(var i=0; i<state.projects.length; i++){
                if(state.projects[i].id === pid){
                    for(var j=0; j<state.projects[i].scripts.length; j++){
                        if(state.projects[i].scripts[j].id === sid) s = state.projects[i].scripts[j];
                    }
                }
            }
            state.tempStore = { pid: pid, sid: sid };
            var h = "";
            h += "<div class='fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4'>";
            h += "<div class='panel-card p-6 w-full max-w-md modal-animate'>";
            h += "<div class='flex justify-between items-center mb-6'><h3 class='text-lg font-bold text-white'>Edit Script</h3><button onclick='closeModal()' class='text-zinc-500 hover:text-white'><i data-lucide='x' class='w-5 h-5'></i></button></div>";
            h += "<div class='space-y-4'>";
            h += "<div><label class='block text-xs font-bold text-zinc-400 mb-2 uppercase'>Script Name</label><input type='text' id='es-name' value='" + s.name + "' class='solid-input'></div>";
            h += "<div><label class='block text-xs font-bold text-zinc-400 mb-2 uppercase'>Game ID</label><input type='text' id='es-gid' value='" + (s.gameId || '') + "' class='solid-input font-mono'></div>";
            h += "<div><label class='block text-xs font-bold text-zinc-400 mb-2 uppercase'>Lua Code</label><textarea id='es-code' class='solid-input h-32 font-mono text-xs'></textarea></div>";
            h += "</div>";
            h += "<div class='flex justify-end gap-3 mt-6'><button onclick='closeModal()' class='px-4 py-2 text-sm text-zinc-400 hover:text-white'>Cancel</button><button onclick='saveEditScript()' class='primary-btn px-4 py-2 text-sm'>Save</button></div>";
            h += "</div></div>";
            document.getElementById('modal-container').innerHTML = h;
            document.getElementById('es-code').value = s.code || "";
            lucide.createIcons();
        }

        async function saveEditScript() {
            var n = document.getElementById('es-name').value.trim();
            var g = document.getElementById('es-gid').value.trim();
            var c = document.getElementById('es-code').value;
            if(!n) return;
            for(var i=0; i<state.projects.length; i++){
                if(state.projects[i].id === state.tempStore.pid){
                    for(var j=0; j<state.projects[i].scripts.length; j++){
                        if(state.projects[i].scripts[j].id === state.tempStore.sid) {
                            state.projects[i].scripts[j].name = n;
                            state.projects[i].scripts[j].gameId = g;
                            state.projects[i].scripts[j].code = c;
                            state.projects[i].scripts[j].version = incrementVersion(state.projects[i].scripts[j].version);
                        }
                    }
                }
            }
            await syncToServer(); closeModal(); showToast('Saved'); renderProjects(document.getElementById('main-content')); lucide.createIcons();
        }

        async function toggleScriptStatusDirect(pid, sid) {
            for(var i=0; i<state.projects.length; i++){
                if(state.projects[i].id === pid){
                    for(var j=0; j<state.projects[i].scripts.length; j++){
                        if(state.projects[i].scripts[j].id === sid) {
                            state.projects[i].scripts[j].status = state.projects[i].scripts[j].status === 'Active' ? 'Inactive' : 'Active';
                        }
                    }
                }
            }
            await syncToServer(); renderProjects(document.getElementById('main-content'));
        }

        async function deleteScript(pid, sid) {
            if(!confirm("Delete this script?")) return;
            for(var i=0; i<state.projects.length; i++){
                if(state.projects[i].id === pid){
                    var arr = [];
                    for(var j=0; j<state.projects[i].scripts.length; j++){
                        if(state.projects[i].scripts[j].id !== sid) arr.push(state.projects[i].scripts[j]);
                    }
                    state.projects[i].scripts = arr;
                }
            }
            await syncToServer(); showToast('Deleted'); renderProjects(document.getElementById('main-content')); lucide.createIcons();
        }

        function openCustomLoaderModal(projectId) {
            var code = "loadstring(game:HttpGet('" + window.location.origin + "/loader/" + projectId + "'))()";
            var h = "";
            h += "<div class='fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4'>";
            h += "<div class='panel-card p-6 w-full max-w-2xl modal-animate'>";
            h += "<div class='flex justify-between items-center mb-4'><h3 class='text-lg font-bold text-white'>Custom Loader</h3><button onclick='closeModal()' class='text-zinc-500'><i data-lucide='x' class='w-5 h-5'></i></button></div>";
            h += "<p class='text-xs text-zinc-400 mb-4'>Users can run this to automatically execute the correct script for the game they are in.</p>";
            h += "<div class='bg-[#000] p-4 rounded-lg border border-white/10 font-mono text-xs text-brand-400 break-all mb-4'>" + code + "</div>";
            h += "<button onclick=\"copyToClipboard('" + code + "'); closeModal();\" class='primary-btn w-full py-2'>Copy to Clipboard</button>";
            h += "</div></div>";
            document.getElementById('modal-container').innerHTML = h;
            lucide.createIcons();
        }

        function renderKeys(mainContainer) {
            var opts = "";
            for(var i=0; i<state.projects.length; i++) {
                opts += "<option value='" + state.projects[i].id + "'>" + state.projects[i].name + "</option>";
            }
            
            var h = "";
            h += "<div class='panel-card p-6 mb-6'>";
            h += "<div class='grid grid-cols-1 md:grid-cols-4 gap-4 items-end'>";
            h += "<div class='md:col-span-2'><label class='block text-xs font-bold text-zinc-500 mb-2'>PROJECT</label><select id='hk-proj' class='solid-input' onchange='drawHwidTable()'>" + (opts || "<option disabled selected>No projects</option>") + "</select></div>";
            h += "<div><label class='block text-xs font-bold text-zinc-500 mb-2'>AMOUNT</label><input type='number' id='hk-amt' value='1' class='solid-input'></div>";
            h += "<div><button onclick='genHwidKey()' class='primary-btn w-full py-2' " + (state.projects.length === 0 ? "disabled" : "") + ">Generate Keys</button></div>";
            h += "</div></div>";
            h += "<div class='panel-card overflow-hidden'><div class='overflow-x-auto'><table class='w-full text-left text-sm whitespace-nowrap min-w-[600px]'>";
            h += "<thead class='bg-[#000] text-zinc-500 text-[10px] font-bold uppercase tracking-wider'><tr><th class='p-4 border-b border-white/5'>Key</th><th class='p-4 border-b border-white/5'>Status</th><th class='p-4 border-b border-white/5 text-right'>Action</th></tr></thead>";
            h += "<tbody id='hk-table-body'></tbody></table></div></div>";
            mainContainer.innerHTML = h;
            
            if(state.projects.length > 0) drawHwidTable();
        }

        window.drawHwidTable = function() {
            var pid = document.getElementById('hk-proj').value;
            var p = null;
            for(var i=0; i<state.projects.length; i++){ if(state.projects[i].id === pid) p = state.projects[i]; }
            var tb = document.getElementById('hk-table-body');
            
            if(!p || !p.hwidKeys || p.hwidKeys.length === 0) {
                tb.innerHTML = "<tr><td colspan='3' class='p-8 text-center text-zinc-500'>No keys found.</td></tr>";
                return;
            }
            
            var th = "";
            for(var j=0; j<p.hwidKeys.length; j++){
                var k = p.hwidKeys[j];
                var badge = k.hwid ? "<span class='bg-red-500/20 text-red-400 px-2 py-1 rounded text-[10px] font-bold'>LOCKED</span>" : "<span class='bg-emerald-500/20 text-emerald-400 px-2 py-1 rounded text-[10px] font-bold'>UNUSED</span>";
                th += "<tr class='border-b border-white/5 hover:bg-white/[0.02]'>";
                th += "<td class='p-4 font-mono text-zinc-300 text-xs'>" + k.key + "</td>";
                th += "<td class='p-4'>" + badge + "</td>";
                th += "<td class='p-4 text-right'><button onclick='resetHWID(\"" + p.id + "\", \"" + k.key + "\")' class='text-blue-400 hover:underline text-xs mr-4'>Reset</button><button onclick='delHwidKey(\"" + p.id + "\", \"" + k.key + "\")' class='text-red-400 hover:underline text-xs'>Delete</button></td>";
                th += "</tr>";
            }
            tb.innerHTML = th;
        }

        window.genHwidKey = async function() {
            var pid = document.getElementById('hk-proj').value;
            var amt = parseInt(document.getElementById('hk-amt').value) || 1;
            for(var i=0; i<state.projects.length; i++){
                if(state.projects[i].id === pid){
                    if(!state.projects[i].hwidKeys) state.projects[i].hwidKeys = [];
                    for(var j=0; j<amt; j++){
                        state.projects[i].hwidKeys.push({ key: generateHWIDKey(), hwid: null, expiresAt: Date.now() + (30*86400000) });
                    }
                }
            }
            await syncToServer(); drawHwidTable(); showToast("Generated " + amt + " keys");
        }

        window.delHwidKey = async function(pid, keyStr) {
            if(!confirm("Delete key?")) return;
            for(var i=0; i<state.projects.length; i++){
                if(state.projects[i].id === pid){
                    var arr = [];
                    for(var j=0; j<state.projects[i].hwidKeys.length; j++){
                        if(state.projects[i].hwidKeys[j].key !== keyStr) arr.push(state.projects[i].hwidKeys[j]);
                    }
                    state.projects[i].hwidKeys = arr;
                }
            }
            await syncToServer(); drawHwidTable();
        }

        window.resetHWID = async function(pid, keyStr) {
            for(var i=0; i<state.projects.length; i++){
                if(state.projects[i].id === pid){
                    for(var j=0; j<state.projects[i].hwidKeys.length; j++){
                        if(state.projects[i].hwidKeys[j].key === keyStr) {
                            state.projects[i].hwidKeys[j].hwid = null;
                            state.projects[i].hwidKeys[j].ip = null;
                        }
                    }
                }
            }
            await syncToServer(); drawHwidTable(); showToast("HWID Reset");
        }

        function renderSettings(mainContainer) {
            var h = "";
            h += "<div class='panel-card p-8 max-w-2xl'>";
            h += "<h3 class='text-lg font-bold text-white mb-6'>API Configuration</h3>";
            h += "<label class='block text-xs font-bold text-zinc-500 mb-2 uppercase'>Your Private API Key</label>";
            h += "<div class='flex gap-4'><input id='s-api' value='" + state.apiKey + "' type='password' class='solid-input font-mono'><button onclick='saveApiSettings()' class='primary-btn px-6 py-2'>Save</button></div>";
            h += "<p class='text-xs text-zinc-500 mt-4'>Required to sync dashboard data with the Discord bot.</p>";
            h += "</div>";
            mainContainer.innerHTML = h;
        }

        window.saveApiSettings = function() {
            state.apiKey = document.getElementById('s-api').value;
            localStorage.setItem('sanctuary_api_key', state.apiKey);
            showToast('Saved.');
        }

        initApp();
    </script>
</body>
</html>
