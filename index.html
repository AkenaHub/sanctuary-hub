<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanctuary | Auth & Service Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.13/mode/lua/lua.min.js"></script>
    <script src="https://unpkg.com/luaparse@0.3.1/luaparse.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { brand: { 500: '#5865F2', 600: '#4752C4' } }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.2); }
        @keyframes toastEnter { 0% { transform: translateX(100%) scale(0.95); opacity: 0; } 100% { transform: translateX(0) scale(1); opacity: 1; } }
        @keyframes toastLeave { 0% { transform: translateX(0) scale(1); opacity: 1; } 100% { transform: translateX(100%) scale(0.95); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98) translateY(5px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        .toast-enter { animation: toastEnter 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .toast-leave { animation: toastLeave 0.2s cubic-bezier(0.5, 0, 0.2, 1) forwards; }
        .modal-animate { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        .cm-s-luauauth.CodeMirror { 
            background: #000000; color: #e2e8f0; border-radius: 0.5rem; padding: 1rem; 
            font-family: monospace; font-size: 13px; line-height: 1.6; border: 1px solid rgba(255, 255, 255, 0.08); 
            height: 320px;
        }
        
        button, input, select { transition: all 0.2s ease; }
        .solid-input { 
            background: #000000; border: 1px solid rgba(255, 255, 255, 0.08); color: white; border-radius: 0.375rem;
        }
        .solid-input:focus { 
            border-color: #5865F2; outline: none; box-shadow: 0 0 0 1px #5865F2;
        }
        .solid-btn {
            background-color: #5865F2; color: white; border-radius: 0.375rem; transition: background-color 0.2s;
        }
        .solid-btn:hover { background-color: #4752C4; }
        
        .panel-card {
            background-color: #09090b;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 0.75rem;
        }
    </style>
</head>
<body class="bg-[#000000] text-zinc-300 font-sans h-screen flex overflow-hidden selection:bg-brand-500/30">

    <aside id="main-sidebar" class="w-64 bg-[#09090b] border-r border-white/5 flex flex-col z-20 hidden">
        <div class="px-6 py-8">
            <div class="flex items-center gap-3 mb-1">
                <i data-lucide="shield" class="w-6 h-6 text-brand-500"></i>
                <h1 class="text-xl font-bold text-white tracking-tight">Sanctuary</h1>
            </div>
            <p class="text-xs text-zinc-500 font-medium">Auth & Service Management</p>
        </div>
        
        <nav id="sidebar-nav" class="flex-1 px-3 space-y-1 mt-4">
            <button onclick="setTab('dashboard')" id="tab-dashboard" class="w-full flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium"><i data-lucide="activity" class="w-4 h-4"></i> Dashboard</button>
            <button onclick="setTab('projects')" id="tab-projects" class="w-full flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium"><i data-lucide="shield" class="w-4 h-4"></i> Projects</button>
            <button onclick="setTab('keys')" id="tab-keys" class="w-full flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium"><i data-lucide="users" class="w-4 h-4"></i> HWID Keys</button>
            <button onclick="setTab('register')" id="tab-register" class="w-full items-center gap-3 px-3 py-2 rounded-md text-sm font-medium hidden"><i data-lucide="settings" class="w-4 h-4"></i> Register</button>
        </nav>
        
        <div id="logout-container" class="p-3 mb-2 space-y-1 hidden">
            <button onclick="setTab('settings')" id="tab-settings" class="w-full flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium text-zinc-400 hover:text-white"><i data-lucide="settings" class="w-4 h-4"></i> Account</button>
            <button onclick="openLogoutModal()" class="w-full flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium text-zinc-400 hover:text-white">
                <i data-lucide="log-out" class="w-4 h-4"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto relative z-10 flex flex-col w-full min-w-0 bg-[#000000]">
        <div id="top-bar" class="w-full px-8 pt-8 pb-4 flex justify-between items-start border-b border-white/5 hidden bg-[#000000]">
            <div>
                 <p id="top-bar-breadcrumbs" class="text-xs text-zinc-500 font-medium mb-1.5 uppercase tracking-widest">Sanctuary / <span class="text-zinc-300" id="top-bar-breadcrumb-active">Dashboard</span></p>
                 <h2 id="top-bar-title" class="text-3xl font-bold text-white tracking-tight">Dashboard</h2>
                 <p id="top-bar-subtitle" class="text-sm text-zinc-500 font-medium mt-1">Track analytics and real-time script executions.</p>
            </div>
            <div class="flex items-center gap-4 mt-2">
                <i data-lucide="bell" class="w-5 h-5 text-zinc-400 hover:text-white cursor-pointer transition-colors" onclick="showToast('Your API Key is expiring soon!', 'error')" id="bell-icon-container"></i>
                <div id="user-avatar-top" class="bg-[#27272a] w-8 h-8 rounded text-white flex items-center justify-center font-bold text-sm border border-white/10"></div>
            </div>
        </div>
        <div id="main-content" class="p-8 max-w-7xl mx-auto flex-1 w-full overflow-x-hidden">
            <div class="flex items-center justify-center h-full">
                <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-brand-500"></i>
            </div>
        </div>
    </main>

    <div id="modal-container" class="z-50 relative"></div>
    <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-2 pointer-events-none"></div>

    <script>
        const state = {
            activeTab: 'dashboard',
            projects: [],
            adminKeys: {},
            user: null,
            apiKey: localStorage.getItem('sanctuary_api_key') || "",
            draftScript: { projectId: null, file: null, code: null }
        };

        window.copyScriptLoader = function(pId, sId) {
            const code = `loadstring(game:HttpGet('${window.location.origin}/raw/${pId}/${sId}'))()`;
            copyToClipboard(code, 'Copied Script Loader!');
        };

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast-enter pointer-events-auto flex items-center gap-3 px-4 py-3 rounded border border-white/10 bg-[#121214] shadow-lg text-sm font-medium text-white`;
            toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="w-4 h-4 ${type === 'error' ? 'text-red-500' : 'text-emerald-500'}"></i><span>${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.remove('toast-enter'); toast.classList.add('toast-leave'); setTimeout(() => toast.remove(), 200); }, 3000);
        }

        function copyToClipboard(text, successMsg) {
            const textArea = document.createElement("textarea"); textArea.value = text; textArea.style.position = "fixed"; 
            document.body.appendChild(textArea); textArea.focus(); textArea.select();
            try { document.execCommand('copy'); showToast(successMsg || 'Copied!'); } catch (err) { showToast('Failed to copy', 'error'); }
            document.body.removeChild(textArea);
        }

        async function generateSHA256(text) {
            const msgBuffer = new TextEncoder().encode(text + Date.now().toString());
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function incrementVersion(ver) {
            let parts = ver.replace('v', '').split('.');
            let patch = parseInt(parts.pop() || 0) + 1; parts.push(patch); return `v${parts.join('.')}`;
        }
        
        function getShortDate() {
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const today = new Date(); return `${months.at(today.getMonth())} ${today.getDate()}`;
        }

        function generateHWIDKey() {
            return Array.from(crypto.getRandomValues(new Uint8Array(12))).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function initApp() {
            const userData = localStorage.getItem('sanctuary_user');
            if (userData) {
                state.user = JSON.parse(userData);
                document.getElementById('main-sidebar').classList.remove('hidden');
                document.getElementById('top-bar').classList.remove('hidden');
                
                document.getElementById('user-avatar-top').innerText = state.user.username.substring(0, 2).toUpperCase();
                
                if (state.user.isAdmin) {
                    const regBtn = document.getElementById('tab-register');
                    regBtn.classList.remove('hidden'); regBtn.classList.add('flex');
                }
                document.getElementById('logout-container').classList.remove('hidden');
                
                await loadFromServer();
                checkApiKeyStatus();
            } else {
                renderLoginPanel();
            }
            lucide.createIcons();
        }

        function renderLoginPanel() {
            document.getElementById('main-content').innerHTML = `
                <div class="flex items-center justify-center h-[80vh]">
                    <div class="panel-card p-10 max-w-md w-full text-center modal-animate">
                        <div class="w-16 h-16 bg-[#18181b] border border-white/5 text-brand-500 rounded-xl flex items-center justify-center mx-auto mb-6"><i data-lucide="shield" class="w-8 h-8"></i></div>
                        <h2 class="text-2xl font-bold text-white mb-2 tracking-tight">Sanctuary</h2>
                        <p class="text-zinc-500 text-sm mb-8">Securely authenticate via Discord.</p>
                        <a href="/api/auth/discord" class="w-full flex items-center justify-center gap-3 solid-btn py-2.5 px-4 text-sm font-medium transition-colors">
                            <i data-lucide="log-in" class="w-5 h-5"></i> <span>Login with Discord</span>
                        </a>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        async function checkApiKeyStatus() {
            if (!state.apiKey || state.user.isAdmin) return;
            try {
                const res = await fetch('/api/check-key', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: state.apiKey })
                });
                const data = await res.json();
                if (data.valid) {
                    const daysLeft = Math.ceil((data.expiresAt - Date.now()) / (1000 * 60 * 60 * 24));
                    if (daysLeft <= 3 && daysLeft >= 1) {
                        document.getElementById('bell-icon-container').classList.add('text-red-500');
                    }
                }
            } catch (err) {}
        }

        async function saveApiKey() {
            const key = document.getElementById('input-user-apikey').value.trim();
            if(!key) return showToast('Please enter an API key', 'error');
            try {
                const res = await fetch('/api/link-key', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ apiKey: key, discordId: state.user.id, discordName: state.user.username })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
                
                state.apiKey = key; localStorage.setItem('sanctuary_api_key', key);
                showToast('API Key saved!'); checkApiKeyStatus();
            } catch (err) { showToast(err.message, 'error'); }
        }

        async function loadFromServer() {
            try {
                const res = await fetch(\`/api/sync?discordId=\${state.user.id}\`);
                if (res.ok) {
                    const data = await res.json();
                    if (data.projects) {
                        state.projects = data.projects;
                    }
                }
            } catch (err) {} 
            finally { renderApp(); }
        }

        async function syncToServer() {
            try {
                const res = await fetch('/api/sync', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ projects: state.projects, apiKey: state.apiKey, discordId: state.user.id })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);
            } catch (err) { showToast(err.message || 'Failed to save. Check key.', 'error'); throw err; }
        }

        function openLogoutModal() {
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                <div class="panel-card p-8 w-full max-w-sm modal-animate text-center border border-white/10">
                    <div class="w-12 h-12 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 border border-red-500/20"><i data-lucide="log-out" class="w-6 h-6"></i></div>
                    <h3 class="text-xl font-bold text-white mb-2">Sign Out</h3>
                    <p class="text-sm text-zinc-400 mb-8">Are you sure you want to sign out or switch accounts?</p>
                    <div class="flex gap-3">
                        <button onclick="closeModal()" class="flex-1 px-4 py-2 bg-[#09090b] border border-white/10 text-white rounded-md text-sm font-medium hover:bg-white/5 transition-colors">Cancel</button>
                        <button onclick="confirmLogout()" class="flex-1 px-4 py-2 bg-red-500 hover:bg-red-600 text-white rounded-md text-sm font-medium transition-colors">Sign Out</button>
                    </div>
                </div>
            </div>`;
            lucide.createIcons();
        }

        function confirmLogout() {
            localStorage.removeItem('sanctuary_user'); localStorage.removeItem('sanctuary_api_key');
            window.location.reload();
        }

        async function setTab(tab) { 
            state.activeTab = tab; 
            if (tab === 'keys' || tab === 'dashboard') await loadFromServer();
            else renderApp();
        }

        function renderApp() {
            if (!state.user) return;

            const titles = {
                'dashboard': { title: 'Dashboard', sub: 'Track analytics and real-time script executions.' },
                'projects': { title: 'Projects', sub: 'Manage your script hubs and loaders.' },
                'keys': { title: 'HWID Keys', sub: 'Generate and manage access keys for your locked projects.' },
                'register': { title: 'Key Management', sub: 'Admin control over user access keys.' },
                'settings': { title: 'Settings', sub: 'Manage your authentication keys and account.' }
            };
            
            const activeInfo = titles[state.activeTab];
            document.getElementById('top-bar-breadcrumb-active').innerText = activeInfo.title;
            document.getElementById('top-bar-title').innerText = activeInfo.title;
            document.getElementById('top-bar-subtitle').innerText = activeInfo.sub;

            ['dashboard', 'projects', 'keys', 'settings'].forEach(t => {
                const el = document.getElementById(`tab-${t}`);
                if (el) el.className = `w-full flex items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors ${state.activeTab === t ? 'bg-brand-500/10 text-brand-400 border-r-2 border-brand-500' : 'text-zinc-400 hover:bg-white/5 hover:text-white border-r-2 border-transparent'}`;
            });
            const regTab = document.getElementById('tab-register');
            if (regTab) regTab.className = `w-full items-center gap-3 px-3 py-2 rounded-md text-sm font-medium transition-colors ${state.activeTab === 'register' ? 'bg-brand-500/10 text-brand-400 border-r-2 border-brand-500' : 'text-zinc-400 hover:bg-white/5 hover:text-white border-r-2 border-transparent'} ${state.user.isAdmin ? 'flex' : 'hidden'}`;

            const main = document.getElementById('main-content');
            
            if (state.activeTab === 'dashboard') {
                renderDashboard(main);
            } else if (state.activeTab === 'projects') {
                renderProjects(main);
            } else if (state.activeTab === 'keys') {
                renderKeys(main);
            } else if (state.activeTab === 'register') {
                renderRegister(main);
            } else {
                renderSettings(main);
            }
            lucide.createIcons();
        }

        function renderProjects(mainContainer) {
            mainContainer.innerHTML = `
                <div class="flex justify-end mb-6 modal-animate">
                    <button onclick="openCreateProjectModal()" class="solid-btn px-4 py-2 flex items-center gap-2 text-sm font-medium transition-colors"><i data-lucide="plus" class="w-4 h-4"></i> Create Project</button>
                </div>
                <div class="space-y-4 modal-animate">${renderProjectsList()}</div>
            `;
        }

        function renderDashboard(mainContainer) {
            let totalExecutions = 0;
            let topScript = { name: "N/A", execs: 0 };
            
            state.projects.forEach(p => p.scripts.forEach(s => {
                const execs = s.executions || 0;
                totalExecutions += execs;
                if (execs >= topScript.execs && execs > 0) {
                    topScript = { name: s.name, execs: execs };
                }
            }));

            mainContainer.innerHTML = `
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8 modal-animate">
                    <div class="panel-card p-6 flex items-center justify-between">
                        <div>
                            <p class="text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-1">Total Executions</p>
                            <p class="text-3xl font-bold text-white">${totalExecutions.toLocaleString()}</p>
                        </div>
                        <div class="w-12 h-12 bg-blue-500/10 rounded-lg flex items-center justify-center text-blue-500 border border-blue-500/20"><i data-lucide="activity" class="w-6 h-6"></i></div>
                    </div>
                    <div class="panel-card p-6 flex items-center justify-between">
                        <div>
                            <p class="text-zinc-400 text-xs font-semibold uppercase tracking-wider mb-1">Most Executed</p>
                            <p class="text-2xl font-bold text-white truncate max-w-[250px]">${topScript.name} <span class="text-lg font-medium text-emerald-500 ml-2">${topScript.execs > 0 ? `(${topScript.execs})` : ''}</span></p>
                        </div>
                        <div class="w-12 h-12 bg-emerald-500/10 rounded-lg flex items-center justify-center text-emerald-500 border border-emerald-500/20"><i data-lucide="flame" class="w-6 h-6"></i></div>
                    </div>
                </div>

                <div class="panel-card p-6 modal-animate w-full">
                    <h3 class="text-sm font-semibold text-white mb-6 flex items-center gap-2"><i data-lucide="bar-chart-2" class="w-4 h-4 text-zinc-400"></i> Execution History</h3>
                    <div class="h-[350px] w-full relative">
                        <canvas id="executionChart"></canvas>
                    </div>
                </div>
            `;
            
            const ctx = document.getElementById('executionChart').getContext('2d');
            const datesSet = new Set();
            const totalHistory = {};

            state.projects.forEach(p => p.scripts.forEach(s => {
                let histSum = 0;
                if (!s.executionHistory) s.executionHistory = {};
                Object.values(s.executionHistory).forEach(v => histSum += v);
                
                if ((s.executions || 0) > histSum) {
                    const fallbackDate = new Date().toISOString().split('T').shift();
                    s.executionHistory[fallbackDate] = (s.executionHistory[fallbackDate] || 0) + (s.executions - histSum);
                }

                Object.keys(s.executionHistory).forEach(d => {
                    datesSet.add(d);
                    totalHistory[d] = (totalHistory[d] || 0) + s.executionHistory[d];
                });
            }));

            if (datesSet.size === 0) datesSet.add(new Date().toISOString().split('T').shift());
            const labels = Array.from(datesSet).sort();
            const colors = ['#10b981', '#5865F2', '#f43f5e', '#f59e0b', '#06b6d4', '#8b5cf6', '#d946ef'];
            let colorIdx = 0;
            const datasets = [];

            state.projects.forEach(p => p.scripts.forEach(s => {
                if(s.executions && s.executions > 0) {
                    const c = colors[colorIdx % colors.length];
                    datasets.push({
                        label: `${p.name} - ${s.name}`,
                        data: labels.map(d => (s.executionHistory && s.executionHistory[d]) ? s.executionHistory[d] : 0),
                        borderColor: c,
                        backgroundColor: 'transparent',
                        tension: 0.1,
                        borderWidth: 2,
                        pointBackgroundColor: '#09090b',
                        pointBorderColor: c,
                        pointBorderWidth: 2,
                        pointRadius: 4
                    });
                    colorIdx++;
                }
            }));

            datasets.push({
                label: 'Total Executions',
                data: labels.map(d => totalHistory[d] || 0),
                borderColor: 'rgba(255, 255, 255, 0.3)',
                backgroundColor: 'transparent',
                borderWidth: 2,
                borderDash:,
                tension: 0.1,
                pointRadius: 0
            });

            new Chart(ctx, {
                type: 'line',
                data: { labels, datasets },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    interaction: { mode: 'index', intersect: false },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: 'rgba(255, 255, 255, 0.5)' } },
                        x: { grid: { display: false }, ticks: { color: 'rgba(255, 255, 255, 0.5)' } }
                    },
                    plugins: {
                        legend: { position: 'bottom', labels: { color: 'rgba(255, 255, 255, 0.7)', usePointStyle: true, boxWidth: 8, padding: 20 } },
                        tooltip: { backgroundColor: '#09090b', titleColor: '#fff', bodyColor: '#ccc', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, padding: 12, cornerRadius: 8 }
                    }
                }
            });
        }

        function renderKeys(mainContainer) {
            const projectOptions = state.projects.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
            
            mainContainer.innerHTML = `
                <div class="max-w-6xl mx-auto modal-animate w-full overflow-hidden">
                    <div class="flex justify-end mb-6">
                        <button onclick="clearInactiveKeys()" class="text-zinc-400 hover:text-red-400 px-4 py-2 rounded flex items-center gap-2 text-sm font-medium border border-white/5 hover:border-red-500/20 bg-[#121214] transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i> Clear Inactive</button>
                    </div>
                    
                    <div class="panel-card p-6 mb-8">
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4 items-end">
                            <div class="lg:col-span-1">
                                <label class="block text-xs font-semibold text-zinc-400 mb-2">Project</label>
                                <select id="hwid-proj-select" class="w-full solid-input px-3 py-2 text-sm" onchange="renderHWIDTable()">
                                    ${projectOptions || '<option disabled selected>No projects</option>'}
                                </select>
                            </div>
                            <div class="lg:col-span-2">
                                <label class="block text-xs font-semibold text-zinc-400 mb-2">Note / Discord ID</label>
                                <input type="text" id="hwid-note" class="w-full solid-input px-3 py-2 text-sm" placeholder="e.g. buyer_discord">
                            </div>
                            <div class="lg:col-span-1">
                                <label class="block text-xs font-semibold text-zinc-400 mb-2">Days</label>
                                <input type="number" id="hwid-days" value="30" class="w-full solid-input px-3 py-2 text-sm">
                            </div>

        async function generateProjectHWIDKey() {
            const projId = document.getElementById('hwid-proj-select').value;
            const note = document.getElementById('hwid-note').value.trim();
            const days = document.getElementById('hwid-days').value;
            const amount = Math.min(1000, Math.max(1, parseInt(document.getElementById('hwid-amount').value) || 1));
            
            const project = state.projects.find(p => p.id === projId);
            if (!project) return;
            
            if (!project.hwidKeys) project.hwidKeys = [];
            const expiresAt = Date.now() + (parseInt(days) * 24 * 60 * 60 * 1000);
            
            for(let i=0; i<amount; i++) {
                project.hwidKeys.push({ key: generateHWIDKey(), note: note, hwid: null, ip: null, lastReset: 0, expiresAt, roleRemoved: false });
            }
            
            try {
                await syncToServer(); showToast(`Generated ${amount} Key(s)!`);
                document.getElementById('hwid-note').value = ''; renderHWIDTable();
            } catch(e) { 
                for(let i=0; i<amount; i++) project.hwidKeys.pop();
            }
        }

        async function clearInactiveKeys() {
            const projId = document.getElementById('hwid-proj-select').value;
            const project = state.projects.find(p => p.id === projId);
            if (!project || !project.hwidKeys) return;
            
            const initialLen = project.hwidKeys.length;
            project.hwidKeys = project.hwidKeys.filter(k => {
                const isUnused = !k.userId;
                const isExpired = Date.now() > k.expiresAt;
                return !isUnused && !isExpired; 
            });
            
            if (project.hwidKeys.length === initialLen) return showToast('No inactive keys found.');
            
            try {
                await syncToServer(); 
                showToast(`Cleared ${initialLen - project.hwidKeys.length} inactive keys!`); 
                renderHWIDTable(); 
            } catch(e) { await loadFromServer(); }
        }

        async function resetHWID(projId, keyStr) {
            const project = state.projects.find(p => p.id === projId);
            const k = project.hwidKeys.find(k => k.key === keyStr);
            const cooldownMs = (project.hwidResetCooldown || 24) * 60 * 60 * 1000;
            
            if (Date.now() - k.lastReset < cooldownMs) {
                const hoursLeft = Math.ceil((cooldownMs - (Date.now() - k.lastReset)) / 3600000);
                return showToast(`Cooldown active. Try again in ${hoursLeft} hours.`, 'error');
            }
            
            const oldHwid = k.hwid; const oldIp = k.ip; const oldReset = k.lastReset;
            k.hwid = null; k.ip = null; k.lastReset = Date.now();
            try { await syncToServer(); showToast('HWID Reset successfully'); renderHWIDTable(); } 
            catch(e) { k.hwid = oldHwid; k.ip = oldIp; k.lastReset = oldReset; renderHWIDTable(); }
        }

        async function deleteHWIDKey(projId, keyStr) {
            if(!confirm("Delete this key? User will lose script access instantly.")) return;
            const project = state.projects.find(p => p.id === projId);
            const kIdx = project.hwidKeys.findIndex(k => k.key === keyStr);
            const kStore = project.hwidKeys[kIdx];
            project.hwidKeys.splice(kIdx, 1);
            try { await syncToServer(); showToast('Key deleted'); renderHWIDTable(); } 
            catch(e) { project.hwidKeys.splice(kIdx, 0, kStore); renderHWIDTable(); }
        }

                        <div><label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wider">HWID Reset Cooldown (Hours)</label><input type="number" id="input-ps-cooldown" value="${project.hwidResetCooldown || 24}" class="w-full solid-input px-3 py-2 text-sm"></div>
                    </div>
                    <div class="flex items-center justify-between mt-6 pt-6 border-t border-white/5">
                        <button onclick="deleteProject('${projectId}')" class="text-red-500 hover:text-red-400 text-sm font-medium flex items-center gap-2 transition-colors"><i data-lucide="trash-2" class="w-4 h-4"></i> Delete</button>
                        <div class="flex gap-3">
                            <button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-zinc-400 hover:text-white">Cancel</button>
                            <button onclick="saveProjectSettings('${projectId}')" class="solid-btn px-4 py-2 text-sm font-medium transition-colors">Save</button>
                        </div>
                    </div>
                </div>
            </div>`;
            window.tempFreeMode = project.freeMode !== false;
            lucide.createIcons();
        }

        function toggleFreeMode() {
            window.tempFreeMode = !window.tempFreeMode;
            const btn = document.getElementById('toggle-freemode');
            const thumb = document.getElementById('toggle-freemode-thumb');
            if(window.tempFreeMode) {
                btn.className = "relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none bg-brand-500 transition-colors duration-200";
                thumb.className = "pointer-events-none absolute left-[2px] inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 translate-x-[16px]";
            } else {
                btn.className = "relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none bg-zinc-700 transition-colors duration-200";
                thumb.className = "pointer-events-none absolute left-[2px] inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 translate-x-0";
            }
        }

        async function saveProjectSettings(projectId) {
            const name = document.getElementById('input-ps-name').value.trim();
            const webhook = document.getElementById('input-ps-webhook').value.trim();
            const cooldown = document.getElementById('input-ps-cooldown').value;
            if (!name) return showToast('Project name cannot be empty', 'error');
            const project = state.projects.find(p => p.id === projectId);
            const oldName = project.name; const oldWebhook = project.webhookUrl; const oldMode = project.freeMode; const oldCooldown = project.hwidResetCooldown;
            project.name = name; project.webhookUrl = webhook; project.freeMode = window.tempFreeMode; project.hwidResetCooldown = parseInt(cooldown);
            try { await syncToServer(); closeModal(); showToast('Project updated'); renderApp(); } 
            catch (err) { project.name = oldName; project.webhookUrl = oldWebhook; project.freeMode = oldMode; project.hwidResetCooldown = oldCooldown; }
        }

        async function deleteProject(projectId) {
            const pIndex = state.projects.findIndex(p => p.id === projectId);
            const pStore = state.projects[pIndex];
            state.projects.splice(pIndex, 1);
            try { await syncToServer(); closeModal(); showToast('Project deleted'); renderApp(); } 
            catch (err) { state.projects.splice(pIndex, 0, pStore); }
        }

        function openAddScriptModal(projectId) {
            state.draftScript = { projectId: projectId, file: null, code: null };
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                <div class="panel-card p-6 w-full max-w-md modal-animate">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-lg font-bold text-white tracking-tight flex items-center gap-2">Add Script</h3>
                        <button onclick="closeModal()" class="text-zinc-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div class="space-y-4">
                        <div><label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wider">Custom Script Name</label><input type="text" id="input-as-name" class="w-full solid-input px-3 py-2 text-sm"></div>
                        <div><label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wider">Roblox Game ID</label><input type="text" id="input-as-gameid" class="w-full solid-input px-3 py-2 text-sm font-mono" placeholder="Leave empty for Universal Script"></div>
                        <div class="flex items-center justify-between bg-[#000000] p-3 rounded-md border border-white/5">
                            <div><p class="text-sm font-medium text-zinc-200">Allow Solara/Xeno</p><p class="text-[10px] text-zinc-500 mt-0.5">Let these executors run the script</p></div>
                            <button id="toggle-solaraxeno-add" onclick="toggleSolaraXenoAdd()" class="relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none bg-zinc-700 transition-colors duration-200"><span id="toggle-solaraxeno-add-thumb" class="pointer-events-none absolute left-[2px] inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 translate-x-0"></span></button>
                        </div>
                        <div><label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wider">Upload File</label>
                            <div id="drop-zone" class="border border-dashed border-white/20 rounded-lg p-8 text-center bg-[#000000] hover:bg-white/5 cursor-pointer transition-colors"><input type="file" accept=".lua" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" onchange="handleFileSelect(event)"><i data-lucide="upload-cloud" class="w-6 h-6 text-zinc-500 mx-auto mb-2"></i><p class="text-xs text-zinc-400 font-medium" id="drop-text">Click or drag file here</p></div>
                        </div>
                    </div>
                    <div class="flex justify-end gap-3 mt-6">
                        <button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-zinc-400 hover:text-white">Cancel</button>
                        <button onclick="submitAddScript()" class="solid-btn px-4 py-2 text-sm font-medium transition-colors">Upload</button>
                    </div>
                </div>
            </div>`;
            window.tempAllowSolaraAdd = false;
            lucide.createIcons(); setupDragDrop();
        }

        function toggleSolaraXenoAdd() {
            window.tempAllowSolaraAdd = !window.tempAllowSolaraAdd;
            const btn = document.getElementById('toggle-solaraxeno-add');
            const thumb = document.getElementById('toggle-solaraxeno-add-thumb');
            if(window.tempAllowSolaraAdd) {
                btn.className = "relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none bg-brand-500 transition-colors duration-200";
                thumb.className = "pointer-events-none absolute left-[2px] inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 translate-x-[16px]";
            } else {
                btn.className = "relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none bg-zinc-700 transition-colors duration-200";
                thumb.className = "pointer-events-none absolute left-[2px] inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 translate-x-0";
            }
        }

        function handleFileSelect(e) { handleFiles(e.target.files); }
        function handleFiles(files) {
            if(files && files.length > 0) {
                const file = files.item(0); 
                if(file && file.name && file.name.toLowerCase().endsWith('.lua')) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        state.draftScript.file = file; state.draftScript.code = event.target.result; 
                        document.getElementById('drop-text').innerHTML = `<span class="text-emerald-500 font-medium">${file.name}</span>`;
                    };
                    reader.readAsText(file);
                } else { showToast('Only .lua files are permitted', 'error'); }
            }
        }
        function setupDragDrop() {
            const dropZone = document.getElementById('drop-zone');
            if(!dropZone) return;
            ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(evt => dropZone.addEventListener(evt, e => { e.preventDefault(); e.stopPropagation(); }, false));
            ['dragenter', 'dragover'].forEach(evt => dropZone.addEventListener(evt, () => dropZone.classList.add('bg-white/5'), false));
            ['dragleave', 'drop'].forEach(evt => dropZone.addEventListener(evt, () => dropZone.classList.remove('bg-white/5'), false));
            dropZone.addEventListener('drop', e => handleFiles(e.dataTransfer.files));
        }

        async function submitAddScript() {
            const name = document.getElementById('input-as-name').value.trim();
            const gameId = document.getElementById('input-as-gameid').value.trim();
            const { file, code, projectId } = state.draftScript;
            if(!name || !file || !code) return showToast('Please provide a name and select a valid Lua file.', 'error');

            if (typeof luaparse !== 'undefined') {
                try { luaparse.parse(code, { comments: false }); } 
                catch (err) {
                    const proceed = confirm(`Syntax Error:\n\n${err.message}\n\nUpload anyway?`);
                    if (!proceed) return;
                }
            }

            const project = state.projects.find(p => p.id === projectId);
            const scriptId = await generateSHA256(name + gameId + "script");
            
            const newScript = { id: scriptId, name: name, gameId: gameId, status: 'Active', version: 'v0.0.1', date: getShortDate(), fileName: file.name, code: code, executions: 0, executionHistory: {}, allowSolaraXeno: window.tempAllowSolaraAdd };
            project.scripts.push(newScript);
            
            try { await syncToServer(); closeModal(); showToast('Script uploaded'); renderApp(); } 
            catch(err) { project.scripts.pop(); }
        }

        function openEditScriptModal(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            const script = project.scripts.find(s => s.id === scriptId);
            window.tempAllowSolaraEdit = script.allowSolaraXeno === true;
            
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                <div class="panel-card p-6 w-full max-w-md modal-animate">
                    <div class="flex justify-between items-center mb-6">
                        <div class="flex items-center gap-3">
                            <h3 class="text-lg font-bold text-white tracking-tight">Edit Script</h3>
                            <span class="px-2 py-0.5 rounded text-[10px] font-bold bg-white/10 text-zinc-300 uppercase">${script.version}</span>
                        </div>
                        <button onclick="closeModal()" class="text-zinc-500 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
                    </div>
                    <div class="space-y-4">
                        <div><label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wider">Script Name</label><input type="text" id="input-es-name" value="${script.name}" class="w-full solid-input rounded-md px-3 py-2 text-sm"></div>
                        <div><label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wider">Game ID</label><input type="text" id="input-es-gameid" value="${script.gameId || ''}" placeholder="Leave empty for Universal Script" class="w-full solid-input rounded-md px-3 py-2 text-sm font-mono"></div>
                        <div class="flex items-center justify-between bg-[#000000] p-3 rounded-md border border-white/5">
                            <div><p class="text-sm font-medium text-zinc-200">Allow Solara/Xeno</p><p class="text-[10px] text-zinc-500 mt-0.5">Let these executors run the script</p></div>
                            <button id="toggle-solaraxeno-edit" onclick="toggleSolaraXenoEdit()" class="relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none ${script.allowSolaraXeno ? 'bg-brand-500' : 'bg-zinc-700'} transition-colors duration-200"><span id="toggle-solaraxeno-edit-thumb" class="pointer-events-none absolute left-[2px] inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 ${script.allowSolaraXeno ? 'translate-x-[16px]' : 'translate-x-0'}"></span></button>
                        </div>
                        <div><label class="block text-xs font-semibold text-zinc-400 mb-2 uppercase tracking-wider">Reupload File <span class="font-normal">(Bumps Version)</span></label><input type="file" id="input-es-file" accept=".lua" class="w-full text-xs text-zinc-400 file:mr-3 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-white/10 file:text-zinc-200 file:font-medium hover:file:bg-white/20 solid-input p-1.5 outline-none cursor-pointer"></div>
                    </div>
                    <div class="flex justify-end gap-3 mt-6">
                        <button onclick="closeModal()" class="px-4 py-2 text-sm font-medium text-zinc-400 hover:text-white">Cancel</button>
                        <button onclick="saveEditScript('${projectId}', '${scriptId}')" class="solid-btn px-4 py-2 text-sm font-medium transition-colors">Save</button>
                    </div>
                </div>
            </div>`;
            lucide.createIcons();
        }

        function toggleSolaraXenoEdit() {
            window.tempAllowSolaraEdit = !window.tempAllowSolaraEdit;
            const btn = document.getElementById('toggle-solaraxeno-edit');
            const thumb = document.getElementById('toggle-solaraxeno-edit-thumb');
            if(window.tempAllowSolaraEdit) {
                btn.className = "relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none bg-brand-500 transition-colors duration-200";
                thumb.className = "pointer-events-none absolute left-[2px] inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 translate-x-[16px]";
            } else {
                btn.className = "relative inline-flex h-5 w-9 flex-shrink-0 cursor-pointer items-center justify-center rounded-full focus:outline-none bg-zinc-700 transition-colors duration-200";
                thumb.className = "pointer-events-none absolute left-[2px] inline-block h-4 w-4 transform rounded-full bg-white transition-transform duration-200 translate-x-0";
            }
        }

        async function saveEditScript(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            const script = project.scripts.find(s => s.id === scriptId);
            const newName = document.getElementById('input-es-name').value.trim();
            const newGameId = document.getElementById('input-es-gameid').value.trim();
            const fileInput = document.getElementById('input-es-file');

            if(!newName) return showToast('Script name cannot be empty', 'error');

            const oldState = Object.assign({}, script);
            script.name = newName; script.gameId = newGameId; script.allowSolaraXeno = window.tempAllowSolaraEdit;

            const processSave = async (codeToCheck) => {
                if (codeToCheck && typeof luaparse !== 'undefined') {
                    try { luaparse.parse(codeToCheck, { comments: false }); } 
                    catch (err) {
                        const proceed = confirm(`Syntax Error:\n\n${err.message}\n\nSave anyway?`);
                        if (!proceed) { Object.assign(script, oldState); return; }
                    }
                }
                try { await syncToServer(); closeModal(); showToast('Script updated'); renderApp(); } 
                catch (err) { Object.assign(script, oldState); }
            };

            if(fileInput.files && fileInput.files.length > 0) {
                const file = fileInput.files.item(0); 
                if(file && file.name && file.name.toLowerCase().endsWith('.lua')) {
                    const reader = new FileReader();
                    reader.onload = async (event) => {
                        script.version = incrementVersion(script.version);
                        script.fileName = file.name; script.code = event.target.result; script.date = getShortDate();
                        await processSave(event.target.result);
                    };
                    reader.readAsText(file);
                    return;
                }
            }
            await processSave(null);
        }

        async function toggleScriptStatusDirect(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            const script = project.scripts.find(s => s.id === scriptId);
            script.status = script.status === 'Active' ? 'Inactive' : 'Active';
            try { await syncToServer(); renderApp(); showToast(`Script ${script.status === 'Active' ? 'enabled' : 'disabled'}`); } 
            catch (err) { script.status = script.status === 'Active' ? 'Inactive' : 'Active'; }
        }

        async function deleteScript(projectId, scriptId) {
            const project = state.projects.find(p => p.id === projectId);
            const sIndex = project.scripts.findIndex(s => s.id === scriptId);
            const sStore = project.scripts[sIndex];
            project.scripts.splice(sIndex, 1);
            try { await syncToServer(); showToast('Script deleted'); renderApp(); } 
            catch (err) { project.scripts.splice(sIndex, 0, sStore); }
        }

        function openCustomLoaderModal(projectId) {
            const project = state.projects.find(p => p.id === projectId);
            document.getElementById('modal-container').innerHTML = `
            <div class="fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4">
                <div class="panel-card p-0 w-full max-w-4xl modal-animate overflow-hidden flex flex-col h-[85vh]">
                    <div class="flex items-center justify-between px-6 py-4 border-b border-white/5 bg-[#09090b]">
                        <h3 class="text-lg font-bold text-white flex items-center gap-2"><i data-lucide="code" class="w-4 h-4 text-zinc-400"></i> Loader Code (Lua)</h3>
                        <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                            <button onclick="copyLoaderLink('${projectId}')" class="px-3 py-1.5 text-xs font-semibold text-zinc-300 hover:text-white border border-white/10 rounded hover:bg-white/5 transition-colors">Copy URL</button>
                            <button onclick="autoGenerateLoader('${projectId}')" class="px-3 py-1.5 text-xs font-semibold text-brand-400 bg-brand-500/10 hover:bg-brand-500/20 rounded border border-brand-500/20 transition-colors">Auto Gen</button>
                            <button onclick="saveLoaderCode('${projectId}')" class="solid-btn px-4 py-1.5 text-xs font-medium transition-colors">Save</button>
                            <button onclick="closeModal()" class="text-zinc-500 hover:text-white ml-2"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                    <div class="flex-1 relative"><textarea id="loader-code-textarea">${project.loaderCode || ""}</textarea></div>
                </div>
            </div>`;
            lucide.createIcons();
            setTimeout(() => { window.loaderEditor = CodeMirror.fromTextArea(document.getElementById('loader-code-textarea'), { mode: 'lua', theme: 'luauauth', lineNumbers: false, matchBrackets: true, indentUnit: 4 }); }, 10);
        }

        function autoGenerateLoader(projectId) {
            if (window.loaderEditor) {
                const project = state.projects.find(p => p.id === projectId);
                let scriptsTable = "";
                if (project && project.scripts) {
                    project.scripts.forEach(s => {
                        if (s.gameId && s.gameId !== "") { scriptsTable += `    ["${s.gameId}"] = "${window.location.origin}/raw/${projectId}/${s.id}",\n`; } 
                        else { scriptsTable += `    ["Universal"] = "${window.location.origin}/raw/${projectId}/${s.id}",\n`; }
                    });
                }
                
                let authSnippet = "";
                let callSnippet = "loadstring(game:HttpGet(Script))()";

                if (project.freeMode === false) {
                    authSnippet = `\nlocal AuthKey = getgenv().script_key or ""\nlocal hw1 = (gethwid and gethwid()) or "nohwid"\nlocal hw2 = game:GetService("RbxAnalyticsService"):GetClientId()\nlocal hwid = hw1 .. "_" .. hw2\n`;
                    callSnippet = `loadstring(game:HttpGet(Script .. "?key=" .. AuthKey .. "&hwid=" .. hwid))()`;
                }
                
                let dynamicLoader = `local ProjectId = "${projectId}"\n`;
                dynamicLoader += `local Scripts = {\n${scriptsTable}}\n`;
                dynamicLoader += `local Script = Scripts[tostring(game.GameId)] or Scripts[game.GameId] or Scripts["Universal"]\n`;
                dynamicLoader += `if Script then${authSnippet}\n    ${callSnippet}\nelse\n    warn("Sanctuary: No valid script found for this game.")\nend`;
                
                window.loaderEditor.setValue(dynamicLoader);
            }
        }

        function copyLoaderLink(projectId) { copyToClipboard(`loadstring(game:HttpGet('${window.location.origin}/loader/${projectId}'))()`, 'Custom Loader URL copied!'); }

        async function saveLoaderCode(projectId) {
            const project = state.projects.find(p => p.id === projectId);
            const oldVal = project.loaderCode; project.loaderCode = window.loaderEditor.getValue();
            try { await syncToServer(); closeModal(); showToast('Loader code saved'); } 
            catch (err) { project.loaderCode = oldVal; }
        }

        initApp();
    </script>
</body>
</html>
